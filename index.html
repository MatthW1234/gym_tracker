// ================= EXERCISES TAB =================
function ExercisesTab({ exercises, entries, addExercise, updateExercise, deleteExercise }) {
  const [name, setName] = useState("");
  const [muscle, setMuscle] = useState("Chest");
  const [editingId, setEditingId] = useState(null);
  const [editName, setEditName] = useState("");
  const [editMuscle, setEditMuscle] = useState("Chest");
  const [confirmDeleteId, setConfirmDeleteId] = useState(null);

  const usageCount = useMemo(() => {
    const counts = {};
    for (const e of entries) counts[e.exerciseId] = (counts[e.exerciseId] || 0) + 1;
    return counts;
  }, [entries]);

  const handleAdd = () => {
    if (!name.trim()) return;
    addExercise(name.trim(), muscle);
    setName("");
  };

  const startEdit = (ex) => { setEditingId(ex.id); setEditName(ex.name); setEditMuscle(ex.muscle); setConfirmDeleteId(null); };
  const cancelEdit = () => setEditingId(null);
  const saveEdit = (id) => {
    if (!editName.trim()) return;
    updateExercise(id, { name: editName.trim(), muscle: editMuscle });
    setEditingId(null);
  };

  return (
    <div className="flex flex-col" style={{ gap: 18 }}>
      <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 10, padding: 16 }}>
        <div style={{ fontSize: 12, color: COLORS.textMuted, fontFamily: "'IBM Plex Mono', monospace", letterSpacing: 0.5, marginBottom: 12 }}>ADD EXERCISE</div>
        <div className="flex" style={{ gap: 8, flexWrap: "wrap" }}>
          <input value={name} onChange={(e) => setName(e.target.value)} placeholder="Exercise name"
            style={{ flex: "2 1 180px", padding: "9px 10px", borderRadius: 7, border: `1px solid ${COLORS.line}`, background: COLORS.surfaceRaised, color: COLORS.text, fontSize: 13.5 }} />
          <select value={muscle} onChange={(e) => setMuscle(e.target.value)}
            style={{ flex: "1 1 160px", padding: "9px 10px", borderRadius: 7, border: `1px solid ${COLORS.line}`, background: COLORS.surfaceRaised, color: COLORS.text, fontSize: 13 }}>
            {CATEGORIES.map((c) => (<optgroup key={c} label={c}>{MUSCLE_GROUPS[c].map((m) => <option key={m} value={m}>{m}</option>)}</optgroup>))}
          </select>
          <button onClick={handleAdd} disabled={!name.trim()} className="flex items-center justify-center"
            style={{ gap: 5, padding: "9px 16px", borderRadius: 7, border: "none", background: name.trim() ? COLORS.text : COLORS.line, color: name.trim() ? COLORS.bg : COLORS.textFaint, fontWeight: 700, fontSize: 12.5, cursor: name.trim() ? "pointer" : "not-allowed" }}>
            <Plus size={13} /> Add
          </button>
        </div>
      </div>

      {CATEGORIES.map((cat) => {
        const inCat = exercises.filter((e) => categoryOf(e) === cat);
        if (inCat.length === 0) return null;
        return (
          <div key={cat}>
            <div className="flex items-center" style={{ gap: 7, marginBottom: 8 }}>
              <div style={{ width: 8, height: 8, borderRadius: 99, background: CATEGORY_COLORS[cat] }} />
              <span style={{ fontSize: 12.5, fontWeight: 600, color: CATEGORY_COLORS[cat] }}>{cat.toUpperCase()}</span>
            </div>
            <div className="flex flex-col" style={{ gap: 6, marginBottom: 4 }}>
              {inCat.map((ex) => {
                const isEditing = editingId === ex.id;
                const isConfirming = confirmDeleteId === ex.id;
                const uses = usageCount[ex.id] || 0;
                return (
                  <div key={ex.id} style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 8, padding: "10px 12px" }}>
                    {isEditing ? (
                      <div className="flex flex-col" style={{ gap: 8 }}>
                        <div className="flex" style={{ gap: 8, flexWrap: "wrap" }}>
                          <input value={editName} onChange={(e) => setEditName(e.target.value)}
                            style={{ flex: "2 1 140px", padding: "7px 9px", borderRadius: 6, border: `1px solid ${COLORS.line}`, background: COLORS.surfaceRaised, color: COLORS.text, fontSize: 13 }} />
                          <select value={editMuscle} onChange={(e) => setEditMuscle(e.target.value)}
                            style={{ flex: "1 1 140px", padding: "7px 9px", borderRadius: 6, border: `1px solid ${COLORS.line}`, background: COLORS.surfaceRaised, color: COLORS.text, fontSize: 12.5 }}>
                            {CATEGORIES.map((c) => (<optgroup key={c} label={c}>{MUSCLE_GROUPS[c].map((m) => <option key={m} value={m}>{m}</option>)}</optgroup>))}
                          </select>
                        </div>
                        <div className="flex" style={{ gap: 8 }}>
                          <button onClick={() => saveEdit(ex.id)} style={{ flex: 1, padding: "7px 0", borderRadius: 6, border: "none", background: COLORS.text, color: COLORS.bg, fontWeight: 700, fontSize: 12, cursor: "pointer" }}>Save</button>
                          <button onClick={cancelEdit} style={{ padding: "7px 14px", borderRadius: 6, border: `1px solid ${COLORS.line}`, background: "transparent", color: COLORS.textMuted, fontSize: 12, cursor: "pointer" }}>Cancel</button>
                        </div>
                      </div>
                    ) : isConfirming ? (
                      <div className="flex items-center justify-between" style={{ flexWrap: "wrap", gap: 8 }}>
                        <span style={{ fontSize: 12.5, color: COLORS.textMuted }}>
                          Delete "{ex.name}"?{uses > 0 ? ` ${uses} logged set${uses === 1 ? "" : "s"} will remain but show as unknown.` : ""}
                        </span>
                        <div className="flex" style={{ gap: 8 }}>
                          <button onClick={() => { deleteExercise(ex.id); setConfirmDeleteId(null); }}
                            style={{ padding: "6px 12px", borderRadius: 6, border: "none", background: CATEGORY_COLORS.Push, color: "#fff", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>Delete</button>
                          <button onClick={() => setConfirmDeleteId(null)} style={{ padding: "6px 12px", borderRadius: 6, border: `1px solid ${COLORS.line}`, background: "transparent", color: COLORS.textMuted, fontSize: 12, cursor: "pointer" }}>Cancel</button>
                        </div>
                      </div>
                    ) : (
                      <div className="flex items-center justify-between">
                        <div className="flex items-center" style={{ gap: 8 }}>
                          <span style={{ fontSize: 13.5 }}>{ex.name}</span>
                          <span style={{ fontSize: 10.5, padding: "2px 7px", borderRadius: 99, border: `1px solid ${MUSCLE_COLORS[ex.muscle] || COLORS.line}66`, color: MUSCLE_COLORS[ex.muscle] || COLORS.textFaint }}>{ex.muscle}</span>
                          {uses > 0 && <span style={{ fontSize: 10.5, color: COLORS.textFaint }}>{uses} logged</span>}
                        </div>
                        <div className="flex items-center" style={{ gap: 10 }}>
                          <button onClick={() => startEdit(ex)} style={{ background: "none", border: "none", color: COLORS.textFaint, cursor: "pointer" }}><Pencil size={14} /></button>
                          <button onClick={() => setConfirmDeleteId(ex.id)} style={{ background: "none", border: "none", color: COLORS.textFaint, cursor: "pointer" }}><Trash2 size={14} /></button>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function CalendarView({ entries, exMap, bwEntries, unit }) {
  const today = new Date();
  const [monthRef, setMonthRef] = useState(new Date(today.getFullYear(), today.getMonth(), 1));
  const [selectedDate, setSelectedDate] = useState(ymd(today));

  const dayIndex = useMemo(() => buildDayIndex(entries, exMap, unit), [entries, exMap, unit]);
  const bwByDate = useMemo(() => Object.fromEntries(bwEntries.map((e) => [e.date, e])), [bwEntries]);
  const weeks = useMemo(() => getMonthGrid(monthRef.getFullYear(), monthRef.getMonth()), [monthRef]);
  const monthIndex = monthRef.getMonth();
  const todayStr2 = ymd(today);

  const goPrevMonth = () => { setMonthRef((d) => addMonths(d, -1)); setSelectedDate(null); };
  const goNextMonth = () => { setMonthRef((d) => addMonths(d, 1)); setSelectedDate(null); };
  const goToday = () => { setMonthRef(new Date(today.getFullYear(), today.getMonth(), 1)); setSelectedDate(todayStr2); };

  const selectedInfo = selectedDate ? dayIndex[selectedDate] : null;
  const selectedBw = selectedDate ? bwByDate[selectedDate] : null;

  const iconBtnStyle = { padding: 8, borderRadius: 8, border: `1px solid ${COLORS.line}`, background: COLORS.surface, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" };

  return (
    <div className="flex flex-col" style={{ gap: 16 }}>
      <div className="flex items-center justify-between">
        <button onClick={goPrevMonth} style={iconBtnStyle}><ChevronLeft size={16} color={COLORS.textMuted} /></button>
        <div className="flex items-center" style={{ gap: 10 }}>
          <span style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 20, letterSpacing: 0.5 }}>{fmtMonthYear(monthRef)}</span>
          <button onClick={goToday} style={{ fontSize: 11, padding: "3px 9px", borderRadius: 99, border: `1px solid ${COLORS.line}`, background: COLORS.surfaceRaised, color: COLORS.textMuted, cursor: "pointer" }}>Today</button>
        </div>
        <button onClick={goNextMonth} style={iconBtnStyle}><ChevronRight size={16} color={COLORS.textMuted} /></button>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4 }}>
        {DAYS.map((d) => (
          <div key={d} style={{ textAlign: "center", fontSize: 10, color: COLORS.textFaint, fontFamily: "'IBM Plex Mono', monospace" }}>{d.slice(0, 2).toUpperCase()}</div>
        ))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4 }}>
        {weeks.flat().map((d, i) => {
          const dateStr = ymd(d);
          const inMonth = d.getMonth() === monthIndex;
          const info = dayIndex[dateStr];
          const hasBw = !!bwByDate[dateStr];
          const isSelected = dateStr === selectedDate;
          const isToday = dateStr === todayStr2;

            <button key={i} onClick={() => setSelectedDate(dateStr)}
              style={{
                aspectRatio: "1", borderRadius: 8, border: isSelected ? `1.5px solid ${COLORS.text}` : `1px solid ${COLORS.line}`,
                background: isSelected ? COLORS.surfaceRaised : COLORS.surface, opacity: inMonth ? 1 : 0.32,
                cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 3, padding: 2,
              }}>
              <span style={{ fontSize: 12, fontFamily: "'IBM Plex Mono', monospace", color: isToday ? CATEGORY_COLORS.Push : COLORS.text, fontWeight: isToday ? 700 : 400 }}>{d.getDate()}</span>
              <div className="flex items-center" style={{ gap: 2, height: 5 }}>
                {cats.slice(0, 4).map((c) => <div key={c} style={{ width: 4, height: 4, borderRadius: 99, background: CATEGORY_COLORS[c] }} />)}
                {hasBw && <div style={{ width: 4, height: 4, borderRadius: 99, background: COLORS.textFaint }} />}
              </div>
            </button>

      </div>

      <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 10, padding: 16 }}>
        {!selectedDate ? (
          <EmptyState icon={CalendarDays} title="PICK A DATE" body="Tap any day above to see what you trained." />
        ) : (
          <>
            <div style={{ fontSize: 12, color: COLORS.textMuted, fontFamily: "'IBM Plex Mono', monospace", letterSpacing: 0.5, marginBottom: 12 }}>
              {fmtDayFull(parseYmd(selectedDate)).toUpperCase()}

            {!selectedInfo && !selectedBw ? (

              <div className="flex flex-col" style={{ gap: 16 }}>
                {selectedInfo && (
                  <>
                    <div className="flex" style={{ gap: 10, flexWrap: "wrap" }}>
                      <StatCard label="VOLUME" value={`${Math.round(selectedInfo.totalVolume).toLocaleString()}${unit}`} sub={`${selectedInfo.totalSets} sets`} color={CATEGORY_COLORS.Push} />

                    <div>

                )}
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

function PeriodSummary({ period, entries, exMap, bwEntries, unit }) {
  const [refDate, setRefDate] = useState(new Date());

  const range = useMemo(() => {
    if (period === "week") { const s = startOfWeek(refDate); return { start: s, end: addDays(s, 6) }; }
    if (period === "month") { return { start: new Date(refDate.getFullYear(), refDate.getMonth(), 1), end: new Date(refDate.getFullYear(), refDate.getMonth() + 1, 0) }; }
    return { start: new Date(refDate.getFullYear(), 0, 1), end: new Date(refDate.getFullYear(), 11, 31) };
  }, [period, refDate]);

  const label = period === "week"
    ? `${fmtDateShort(range.start)} – ${fmtDateShort(range.end)}, ${range.end.getFullYear()}`
    : period === "month" ? fmtMonthYear(refDate) : String(refDate.getFullYear());

  const agg = useMemo(() => aggregateEntriesInRange(entries, exMap, unit, range.start, range.end), [entries, exMap, unit, range]);

  const buckets = useMemo(() => {
    if (period === "week") {
      return Array.from({ length: 7 }, (_, i) => { const d = addDays(range.start, i); return { start: d, end: d, label: DAYS[i] }; });
    }
    if (period === "month") {
      const bks = []; let cursor = range.start;
      while (cursor <= range.end) {
        const wEnd = addDays(cursor, 6) > range.end ? range.end : addDays(cursor, 6);
        bks.push({ start: cursor, end: wEnd, label: fmtDateShort(cursor) });
        cursor = addDays(wEnd, 1);
      }
      return bks;
    }
    return Array.from({ length: 12 }, (_, i) => ({ start: new Date(range.start.getFullYear(), i, 1), end: new Date(range.start.getFullYear(), i + 1, 0), label: MONTH_SHORT[i] }));
  }, [period, range]);

  const chartData = useMemo(() => buckets.map((b) => {
    const a = aggregateEntriesInRange(entries, exMap, unit, b.start, b.end);
    const row = { label: b.label };
    CATEGORIES.forEach((c) => { row[c] = a.byCategory[c]?.volume || 0; });
    return row;
  }), [buckets, entries, exMap, unit]);

  const bwInRange = useMemo(() => {
    const s = ymd(range.start), e = ymd(range.end);
    return bwEntries.filter((b) => b.date >= s && b.date <= e);
  }, [bwEntries, range]);
  const bwFirst = bwInRange[0]; const bwLast = bwInRange[bwInRange.length - 1];
  const bwChange = bwFirst && bwLast && bwFirst !== bwLast
    ? (unit === "kg" ? bwLast.weightKg - bwFirst.weightKg : kgToLb(bwLast.weightKg) - kgToLb(bwFirst.weightKg))
    : null;

  const goPrev = () => setRefDate((d) => period === "week" ? addDays(d, -7) : period === "month" ? addMonths(d, -1) : addYears(d, -1));
  const goNext = () => setRefDate((d) => period === "week" ? addDays(d, 7) : period === "month" ? addMonths(d, 1) : addYears(d, 1));
  const goCurrent = () => setRefDate(new Date());

  const barSeries = CATEGORIES.filter((c) => agg.byCategory[c]).map((c) => ({ dataKey: c, color: CATEGORY_COLORS[c], label: c }));
  const iconBtnStyle = { padding: 8, borderRadius: 8, border: `1px solid ${COLORS.line}`, background: COLORS.surface, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" };

  return (
    <div className="flex flex-col" style={{ gap: 16 }}>
      <div className="flex items-center justify-between">
        <button onClick={goPrev} style={iconBtnStyle}><ChevronLeft size={16} color={COLORS.textMuted} /></button>
        <div className="flex items-center" style={{ gap: 10 }}>
          <span style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 19, letterSpacing: 0.5 }}>{label}</span>
          <button onClick={goCurrent} style={{ fontSize: 11, padding: "3px 9px", borderRadius: 99, border: `1px solid ${COLORS.line}`, background: COLORS.surfaceRaised, color: COLORS.textMuted, cursor: "pointer" }}>
            {period === "week" ? "This Week" : period === "month" ? "This Month" : "This Year"}
          </button>
        </div>
        <button onClick={goNext} style={iconBtnStyle}><ChevronRight size={16} color={COLORS.textMuted} /></button>
      </div>

      {agg.totalSets === 0 ? (
        <EmptyState icon={CalendarDays} title="NOTHING LOGGED" body={`No sets logged for this ${period}.`} />
      ) : (
        <>
          <div className="flex" style={{ gap: 10, flexWrap: "wrap" }}>
            <StatCard label="SESSIONS" value={agg.sessionDays.size} sub={`day${agg.sessionDays.size === 1 ? "" : "s"} trained`} color={CATEGORY_COLORS.Push} />
            <StatCard label="TOTAL VOLUME" value={`${Math.round(agg.totalVolume).toLocaleString()}${unit}`} sub={`${agg.totalSets} sets`} color={CATEGORY_COLORS.Pull} />
            <StatCard label="TOTAL REPS" value={agg.totalReps} sub="across all sets" color={CATEGORY_COLORS.Legs} />
            {bwChange !== null && (
              <StatCard label="BODYWEIGHT" value={`${bwChange >= 0 ? "+" : ""}${fmt(bwChange)}${unit}`} sub={`over this ${period}`} color={bwChange >= 0 ? CATEGORY_COLORS.Push : CATEGORY_COLORS.Pull} />
            )}
          </div>

          <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 10, padding: "16px 8px 8px" }}>
            <div style={{ fontSize: 12, color: COLORS.textMuted, fontFamily: "'IBM Plex Mono', monospace", letterSpacing: 0.5, padding: "0 12px 6px" }}>
              VOLUME BY {period === "week" ? "DAY" : period === "month" ? "WEEK" : "MONTH"}
            </div>
            <ChartLegend items={barSeries.map((s) => ({ label: s.label, color: s.color }))} />
            <SimpleStackedBarChart data={chartData} xKey="label" unit={unit} series={barSeries} />
          </div>

          <div>
            <div style={{ fontSize: 11, color: COLORS.textMuted, marginBottom: 8 }}>BY CATEGORY</div>
            <CategoryBreakdown byCategory={agg.byCategory} unit={unit} />
          </div>

          <MuscleBreakdown byMuscle={agg.byMuscle} unit={unit} />
        </>
      )}
    </div>
  );
}

function CategoryBreakdown({ byCategory, unit }) {
  const grandTotal = Object.values(byCategory).reduce((s, c) => s + c.volume, 0);
  const present = CATEGORIES.filter((c) => byCategory[c]);
  if (present.length === 0) return null;
  return (
    <div className="flex" style={{ gap: 10, flexWrap: "wrap" }}>
      {present.map((c) => {
        const pct = grandTotal ? (byCategory[c].volume / grandTotal) * 100 : 0;
        return (
          <div key={c} style={{ flex: "1 1 150px", background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 10, padding: 12 }}>
            <div className="flex items-center justify-between" style={{ marginBottom: 6 }}>
              <span style={{ fontSize: 12, fontWeight: 600, color: CATEGORY_COLORS[c] }}>{c}</span>
              <span style={{ fontSize: 11, color: COLORS.textFaint }}>{fmt(pct)}%</span>
            </div>
            <div style={{ height: 5, background: COLORS.surfaceRaised, borderRadius: 3, overflow: "hidden" }}>
              <div style={{ width: `${pct}%`, height: "100%", background: CATEGORY_COLORS[c] }} />
            </div>
            <div style={{ fontSize: 10.5, color: COLORS.textFaint, marginTop: 5 }}>{byCategory[c].reps} reps · {Math.round(byCategory[c].volume).toLocaleString()}{unit}</div>
          </div>
        );
      })}
    </div>
  );
}

function MuscleBreakdown({ byMuscle, unit, title = "BY MUSCLE GROUP" }) {
  const musclesPresent = MUSCLE_LIST.filter((m) => byMuscle[m.muscle]);
  if (musclesPresent.length === 0) return null;
  return (
    <div>
      <div style={{ fontSize: 11, color: COLORS.textMuted, marginBottom: 8 }}>{title}</div>
      <div className="flex flex-col" style={{ gap: 12 }}>
        {CATEGORIES.map((cat) => {
          const muscles = musclesPresent.filter((m) => m.category === cat);
          if (muscles.length === 0) return null;
          return (
            <div key={cat}>
              <div className="flex items-center" style={{ gap: 6, marginBottom: 6 }}>
                <div style={{ width: 7, height: 7, borderRadius: 99, background: CATEGORY_COLORS[cat] }} />
                <span style={{ fontSize: 11.5, fontWeight: 600, color: CATEGORY_COLORS[cat] }}>{cat}</span>
              </div>
              <div className="flex flex-col" style={{ gap: 4 }}>
                {muscles.map((m) => {
                  const d = byMuscle[m.muscle];
                  return (
                    <div key={m.muscle} className="flex items-center justify-between" style={{ padding: "6px 10px", background: COLORS.surfaceRaised, borderRadius: 6 }}>
                      <span style={{ fontSize: 12.5, color: MUSCLE_COLORS[m.muscle] }}>{m.muscle}</span>
                      <span style={{ fontSize: 11.5, color: COLORS.textFaint, fontFamily: "'IBM Plex Mono', monospace" }}>{d.reps} reps · {Math.round(d.volume).toLocaleString()}{unit} · {d.sets} sets</span>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<GymTracker />);
</script>

        presets: [["react", { runtime: "classic" }]],
      }).code;
      var script = document.createElement("script");
      script.textContent = output;
      document.body.appendChild(script);

      document.getElementById("root").innerHTML =

</script>
