// ================= TOKENS =================
const COLORS = {
  bg: "#18181B", surface: "#212124", surfaceRaised: "#28282C", line: "#38383D",
  text: "#F2F0EA", textMuted: "#8E8E93", textFaint: "#5A5A5F",
};
const CATEGORY_COLORS = { Push: "#D6483F", Pull: "#3573A5", Legs: "#DDA83A", Core: "#4C9A6A", Other: "#B5B5BA" };
const CATEGORIES = Object.keys(CATEGORY_COLORS);
const DAYS = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];

// ================= MUSCLE TAXONOMY =================
const MUSCLE_GROUPS = {
  Push: ["Chest", "Shoulders", "Triceps"],
  Pull: ["Back", "Biceps", "Traps"],
  Legs: ["Quads", "Hamstrings", "Glutes", "Calves"],
  Core: ["Abs", "Obliques"],
  Other: ["Cardio", "Full Body", "Other"],
};
const MUSCLE_LIST = Object.entries(MUSCLE_GROUPS).flatMap(([cat, muscles]) => muscles.map((m) => ({ muscle: m, category: cat })));
const MUSCLE_TO_CATEGORY = Object.fromEntries(MUSCLE_LIST.map((m) => [m.muscle, m.category]));

function shadeHex(hex, percent) {
  const num = parseInt(hex.replace("#", ""), 16);
  let r = (num >> 16) + Math.round(255 * percent);
  let g = ((num >> 8) & 0xff) + Math.round(255 * percent);
  let b = (num & 0xff) + Math.round(255 * percent);
  r = Math.min(255, Math.max(0, r)); g = Math.min(255, Math.max(0, g)); b = Math.min(255, Math.max(0, b));
  return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}
const MUSCLE_COLORS = {};
Object.entries(MUSCLE_GROUPS).forEach(([cat, muscles]) => {
  muscles.forEach((m, i) => {
    const steps = muscles.length;
    const factor = steps <= 1 ? 0 : (i / (steps - 1)) * 0.5 - 0.25;
    MUSCLE_COLORS[m] = shadeHex(CATEGORY_COLORS[cat], factor);
  });
});

function categoryOf(exercise) {
  return MUSCLE_TO_CATEGORY[exercise?.muscle] || "Other";
}
function migrateExercises(list) {
  let changed = false;
  const next = list.map((e) => {
    if (e.muscle && MUSCLE_TO_CATEGORY[e.muscle]) return e;
    changed = true;
    const cat = e.category && MUSCLE_GROUPS[e.category] ? e.category : "Other";
    return { id: e.id, name: e.name, muscle: MUSCLE_GROUPS[cat][0] };
  });
  return { list: next, changed };
}

];

const PLATES_KG = [25, 20, 15, 10, 5, 2.5, 1.25];
const PLATES_LB = [45, 35, 25, 10, 5, 2.5];
const PLATE_COLOR_KG = { 25: "#D6483F", 20: "#3573A5", 15: "#DDA83A", 10: "#4C9A6A", 5: "#B5B5BA", 2.5: "#26262A", 1.25: "#26262A" };
const PLATE_COLOR_LB = { 45: "#D6483F", 35: "#3573A5", 25: "#DDA83A", 10: "#4C9A6A", 5: "#B5B5BA", 2.5: "#26262A" };
const BAR_KG = 20, BAR_LB = 45;

function genId() { return `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`; }
function todayStr() { return new Date().toISOString().slice(0, 10); }
function epley1RM(weight, reps) { return reps <= 1 ? weight : weight * (1 + reps / 30); }

// ================= PROGRESSIVE OVERLOAD HELPERS =================
function getLastSession(entries, exerciseId, beforeDate, unit) {
  const prior = entries.filter((e) => e.exerciseId === exerciseId && e.date < beforeDate);
  if (prior.length === 0) return null;
  const lastDate = prior.reduce((max, e) => (e.date > max ? e.date : max), prior[0].date);
  const sets = prior
    .filter((e) => e.date === lastDate)
    .map((e) => ({ weight: unit === "kg" ? e.weightKg : kgToLb(e.weightKg), reps: e.reps }));
  const topE1rm = Math.max(...sets.map((s) => epley1RM(s.weight, s.reps)));
  return { date: lastDate, sets, topE1rm };
}

function getSetBadge(entries, exerciseId, dateStr, weightDisplay, reps, unit) {
  const prior = entries.filter((e) => e.exerciseId === exerciseId && e.date < dateStr);
  if (prior.length === 0) return { type: "first" };
  const e1rm = epley1RM(weightDisplay, reps);
  const priorE1rms = prior.map((e) => epley1RM(unit === "kg" ? e.weightKg : kgToLb(e.weightKg), e.reps));
  const allTimeBest = Math.max(...priorE1rms);
  if (e1rm > allTimeBest * 1.001) return { type: "pr" };
  const lastSession = getLastSession(entries, exerciseId, dateStr, unit);
  if (!lastSession) return null;
  if (e1rm > lastSession.topE1rm * 1.005) return { type: "up" };
  if (e1rm >= lastSession.topE1rm * 0.995) return { type: "match" };
  return null;
}

function computeTrendStatus(sessions) {
  if (sessions.length < 2) return { status: "new", label: "Not enough sessions yet" };
  const last = sessions[sessions.length - 1];
  const prior = sessions.slice(Math.max(0, sessions.length - 4), sessions.length - 1);
  const priorBest = Math.max(...prior.map((s) => s.e1rm));
  const priorAvg = prior.reduce((s, p) => s + p.e1rm, 0) / prior.length;
  if (last.e1rm > priorBest * 1.01) return { status: "progressing", label: "Progressing" };
  if (last.e1rm < priorAvg * 0.97) return { status: "declining", label: "Stalling" };
  return { status: "steady", label: "Holding steady" };
}
function kgToLb(kg) { return kg * 2.20462; }
function lbToKg(lb) { return lb / 2.20462; }
function fmt(n) { return Math.round(n * 10) / 10; }
function dayNameFromDateStr(dateStr) { const idx = new Date(dateStr + "T00:00:00").getDay(); return DAYS[(idx + 6) % 7]; }
function isoWeekKey(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() + 4 - (d.getDay() || 7));
  const yearStart = new Date(d.getFullYear(), 0, 1);
  const weekNo = Math.ceil(((d - yearStart) / 86400000 + 1) / 7);
  return `${d.getFullYear()}-W${String(weekNo).padStart(2, "0")}`;
}

// ================= DATE HELPERS (History tab) =================
const MONTH_NAMES = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
const MONTH_SHORT = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
const DAY_NAMES_FULL = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

function ymd(d) { return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`; }
function parseYmd(s) { return new Date(s + "T00:00:00"); }
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
function addMonths(d, n) { const r = new Date(d); r.setMonth(r.getMonth() + n); return r; }
function addYears(d, n) { const r = new Date(d); r.setFullYear(r.getFullYear() + n); return r; }
function startOfWeek(d) { return addDays(d, -((d.getDay() + 6) % 7)); } // Monday-based
function fmtMonthYear(d) { return `${MONTH_NAMES[d.getMonth()]} ${d.getFullYear()}`; }
function fmtDayFull(d) { return `${DAY_NAMES_FULL[d.getDay()]}, ${MONTH_NAMES[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`; }
function fmtDateShort(d) { return `${MONTH_SHORT[d.getMonth()]} ${d.getDate()}`; }

function getMonthGrid(year, monthIndex) {
  const first = new Date(year, monthIndex, 1);
  const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();
  const startOffset = (first.getDay() + 6) % 7;
  const weeksNeeded = Math.ceil((startOffset + daysInMonth) / 7);
  const weeks = [];
  let cursor = addDays(first, -startOffset);
  for (let w = 0; w < weeksNeeded; w++) {
    const week = [];
    for (let d = 0; d < 7; d++) { week.push(cursor); cursor = addDays(cursor, 1); }
    weeks.push(week);
  }
  return weeks;
}

// Aggregates workout entries within [startDate, endDate] (inclusive) — date strings compare
// correctly lexicographically since they're always YYYY-MM-DD.
function aggregateEntriesInRange(entries, exMap, unit, startDate, endDate) {
  const startStr = ymd(startDate), endStr = ymd(endDate);
  let totalVolume = 0, totalReps = 0, totalSets = 0;
  const sessionDays = new Set(); const byCategory = {}; const byMuscle = {};
  for (const e of entries) {
    if (e.date < startStr || e.date > endStr) continue;
    const ex = exMap[e.exerciseId]; const cat = categoryOf(ex); const musc = ex?.muscle || "Other";
    const w = unit === "kg" ? e.weightKg : kgToLb(e.weightKg); const vol = w * e.reps;
    totalVolume += vol; totalReps += e.reps; totalSets += 1; sessionDays.add(e.date);
    if (!byCategory[cat]) byCategory[cat] = { volume: 0, reps: 0, sets: 0 };
    byCategory[cat].volume += vol; byCategory[cat].reps += e.reps; byCategory[cat].sets += 1;
    if (!byMuscle[musc]) byMuscle[musc] = { volume: 0, reps: 0, sets: 0 };
    byMuscle[musc].volume += vol; byMuscle[musc].reps += e.reps; byMuscle[musc].sets += 1;
  }
  return { totalVolume, totalReps, totalSets, sessionDays, byCategory, byMuscle };
}

function buildDayIndex(entries, exMap, unit) {
  const map = {};
  for (const e of entries) {
    const ex = exMap[e.exerciseId]; const cat = categoryOf(ex); const musc = ex?.muscle || "Other";
    const w = unit === "kg" ? e.weightKg : kgToLb(e.weightKg); const vol = w * e.reps;
    if (!map[e.date]) map[e.date] = { totalVolume: 0, totalReps: 0, totalSets: 0, byCategory: {}, byMuscle: {}, byExercise: {} };
    const d = map[e.date];
    d.totalVolume += vol; d.totalReps += e.reps; d.totalSets += 1;
    if (!d.byCategory[cat]) d.byCategory[cat] = { volume: 0, reps: 0, sets: 0 };
    d.byCategory[cat].volume += vol; d.byCategory[cat].reps += e.reps; d.byCategory[cat].sets += 1;
    if (!d.byMuscle[musc]) d.byMuscle[musc] = { volume: 0, reps: 0, sets: 0 };
    d.byMuscle[musc].volume += vol; d.byMuscle[musc].reps += e.reps; d.byMuscle[musc].sets += 1;
    if (!d.byExercise[e.exerciseId]) d.byExercise[e.exerciseId] = [];
    d.byExercise[e.exerciseId].push({ weight: w, reps: e.reps, id: e.id });
  }
  return map;
}
function calcPlates(targetWeight, unit) {
  const bar = unit === "kg" ? BAR_KG : BAR_LB;
  const plateSet = unit === "kg" ? PLATES_KG : PLATES_LB;
  const colorMap = unit === "kg" ? PLATE_COLOR_KG : PLATE_COLOR_LB;
  let perSide = Math.max(0, (targetWeight - bar) / 2);
  const plates = [];
  for (const p of plateSet) { while (perSide >= p - 0.001) { plates.push({ size: p, color: colorMap[p] }); perSide -= p; } }
  return { plates, bar };
}

const ACTIVITY_LEVELS = [
  { value: "sedentary", label: "Sedentary", mult: 1.2, desc: "little or no exercise" },
  { value: "light", label: "Light", mult: 1.375, desc: "exercise 1–3 days/week" },

  { value: "active", label: "Active", mult: 1.725, desc: "exercise 6–7 days/week" },
  { value: "veryactive", label: "Very Active", mult: 1.9, desc: "hard training + physical job" },

const GOALS = [
  { value: "cut", label: "Cut", delta: -500 },
  { value: "maintain", label: "Maintain", delta: 0 },

function calcBMR(weightKg, heightCm, age, sex) {
  const base = 10 * weightKg + 6.25 * heightCm - 5 * age;
  return sex === "male" ? base + 5 : base - 161;
}
function cmToFtIn(cm) {
  const totalIn = cm / 2.54;
  const ft = Math.floor(totalIn / 12);
  const inch = Math.round(totalIn % 12);
  return { ft, inch };
}
function ftInToCm(ft, inch) { return (ft * 12 + inch) * 2.54; }

const STORAGE_PREFIX = "ironlog:";
async function loadJSON(key, fallback) {
  try {
    const raw = localStorage.getItem(STORAGE_PREFIX + key);
    return raw ? JSON.parse(raw) : fallback;
  } catch { return fallback; }
}

function niceMax(v) { if (v <= 0) return 1; const p = Math.pow(10, Math.floor(Math.log10(v))); const n = v / p; const step = n <= 1 ? 1 : n <= 2 ? 2 : n <= 5 ? 5 : 10; return step * p; }

function SimpleLineChart({ data, xKey, lines, unit = "", height = 260 }) {
  const W = 640, H = height, padL = 46, padR = 16, padT = 14, padB = 28;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  if (!data.length) return null;
  let allVals = [];
  lines.forEach((ln) => data.forEach((d) => { if (typeof d[ln.dataKey] === "number") allVals.push(d[ln.dataKey]); }));
  let min = Math.min(...allVals), max = Math.max(...allVals);
  if (min === max) { min -= 1; max += 1; }
  const pad = (max - min) * 0.12;
  min -= pad; max += pad;
  const xFor = (i) => padL + (data.length === 1 ? plotW / 2 : (i / (data.length - 1)) * plotW);
  const yFor = (v) => padT + (1 - (v - min) / (max - min)) * plotH;
  const gridLines = 4;
  const showEvery = Math.max(1, Math.ceil(data.length / 7));

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>
      {Array.from({ length: gridLines + 1 }).map((_, i) => {
        const v = min + ((max - min) * i) / gridLines;
        const y = yFor(v);
        return (
          <g key={i}>
            <line x1={padL} y1={y} x2={W - padR} y2={y} stroke={COLORS.line} strokeDasharray="3 3" />
            <text x={padL - 8} y={y + 3} fontSize="10" fill={COLORS.textFaint} textAnchor="end" fontFamily="IBM Plex Mono, monospace">{fmt(v)}{unit}</text>
          </g>
        );
      })}
      {data.map((d, i) => (i % showEvery === 0 || i === data.length - 1) && (
        <text key={i} x={xFor(i)} y={H - 8} fontSize="10" fill={COLORS.textFaint} textAnchor="middle" fontFamily="IBM Plex Mono, monospace">{d[xKey]}</text>
      ))}
      {lines.map((ln) => {
        const pts = data.map((d, i) => `${xFor(i)},${yFor(d[ln.dataKey])}`).join(" ");
        return (
          <g key={ln.dataKey}>
            <polyline points={pts} fill="none" stroke={ln.color} strokeWidth="2.5" strokeDasharray={ln.dashed ? "5 4" : "0"} strokeLinecap="round" strokeLinejoin="round" />
            {data.map((d, i) => (
              <circle key={i} cx={xFor(i)} cy={yFor(d[ln.dataKey])} r="3.2" fill={ln.color}>
                <title>{`${ln.label}: ${fmt(d[ln.dataKey])}${unit} (${d[xKey]})`}</title>
              </circle>
            ))}
          </g>
        );
      })}
    </svg>
  );
}

function SimpleStackedBarChart({ data, xKey, series, unit = "", height = 260 }) {
  const W = 640, H = height, padL = 46, padR = 16, padT = 14, padB = 28;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  if (!data.length) return null;
  const totals = data.map((d) => series.reduce((s, ser) => s + (d[ser.dataKey] || 0), 0));
  const max = niceMax(Math.max(...totals, 1));
  const yFor = (v) => padT + (1 - v / max) * plotH;
  const gap = 0.35;
  const bw = (plotW / data.length) * (1 - gap);
  const gridLines = 4;

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>
      {Array.from({ length: gridLines + 1 }).map((_, i) => {
        const v = (max * i) / gridLines;
        const y = yFor(v);
        return (
          <g key={i}>
            <line x1={padL} y1={y} x2={W - padR} y2={y} stroke={COLORS.line} strokeDasharray="3 3" />
            <text x={padL - 8} y={y + 3} fontSize="10" fill={COLORS.textFaint} textAnchor="end" fontFamily="IBM Plex Mono, monospace">{Math.round(v)}</text>
          </g>
        );
      })}
      {data.map((d, i) => {
        const cx = padL + (i + 0.5) * (plotW / data.length);
        let cum = 0;
        return (
          <g key={i}>
            {series.map((ser) => {
              const v = d[ser.dataKey] || 0;
              if (v <= 0) return null;
              const y0 = yFor(cum), y1 = yFor(cum + v);
              cum += v;
              return (
                <rect key={ser.dataKey} x={cx - bw / 2} y={y1} width={bw} height={Math.max(0, y0 - y1)} fill={ser.color}>
                  <title>{`${ser.label}: ${Math.round(v)}${unit}`}</title>
                </rect>
              );
            })}
            <text x={cx} y={H - 8} fontSize="9.5" fill={COLORS.textFaint} textAnchor="middle" fontFamily="IBM Plex Mono, monospace">{d[xKey]}</text>
          </g>
        );
      })}
    </svg>
  );
}

function GymTracker() {
  const [tab, setTab] = useState("log");
  const [unit, setUnit] = useState("kg");

    })();
  }, []);

  const changeUnit = useCallback((u) => { setUnit(u); saveJSON("unit_pref", u); }, []);
  const addExercise = useCallback((name, muscle) => {
    const ex = { id: genId(), name, muscle };
    setExercises((prev) => { const next = [...prev, ex]; saveJSON("exercises", next); return next; });
    return ex.id;
  }, []);
  const updateExercise = useCallback((id, updates) => {
    setExercises((prev) => { const next = prev.map((e) => (e.id === id ? { ...e, ...updates } : e)); saveJSON("exercises", next); return next; });
  }, []);
  const deleteExercise = useCallback((id) => {
    setExercises((prev) => { const next = prev.filter((e) => e.id !== id); saveJSON("exercises", next); return next; });
    setRoutines((prev) => {
      const next = prev.map((r) => ({ ...r, items: r.items.filter((it) => it.exerciseId !== id) })).filter((r) => r.items.length > 0);
      saveJSON("routines", next);
      return next;
    });
  }, []);
  const addEntry = useCallback((entry) => { setEntries((prev) => { const next = [...prev, entry]; saveJSON("workout_entries", next); return next; }); }, []);
  const deleteEntry = useCallback((id) => { setEntries((prev) => { const next = prev.filter((e) => e.id !== id); saveJSON("workout_entries", next); return next; }); }, []);
  const addBw = useCallback((entry) => { setBwEntries((prev) => { const next = [...prev, entry].sort((a, b) => a.date.localeCompare(b.date)); saveJSON("bodyweight_entries", next); return next; }); }, []);
  const deleteBw = useCallback((id) => { setBwEntries((prev) => { const next = prev.filter((e) => e.id !== id); saveJSON("bodyweight_entries", next); return next; }); }, []);
  const saveRoutines = useCallback((next) => { setRoutines(next); saveJSON("routines", next); }, []);
  const saveWeekPlan = useCallback((next) => { setWeekPlan(next); saveJSON("week_plan", next); }, []);
  const saveProfile = useCallback((next) => { setProfile(next); saveJSON("profile", next); }, []);
  const addFood = useCallback((entry) => { setFoodEntries((prev) => { const next = [...prev, entry]; saveJSON("food_entries", next); return next; }); }, []);
  const deleteFood = useCallback((id) => { setFoodEntries((prev) => { const next = prev.filter((e) => e.id !== id); saveJSON("food_entries", next); return next; }); }, []);

  const exMap = useMemo(() => Object.fromEntries(exercises.map((e) => [e.id, e])), [exercises]);

  const TABS = [
    { key: "log", label: "Log", icon: Dumbbell },
    { key: "exercises", label: "Exercises", icon: Pencil },
    { key: "routines", label: "Routines", icon: ListChecks },
    { key: "prshelf", label: "PR Shelf", icon: Trophy },
    { key: "progress", label: "Progress", icon: TrendingUp },
    { key: "volume", label: "Volume", icon: LayoutGrid },
    { key: "history", label: "History", icon: CalendarDays },
    { key: "bodyweight", label: "Bodyweight", icon: Scale },
    { key: "nutrition", label: "Nutrition", icon: Flame },
  ];

  const [slideDir, setSlideDir] = useState(1);
  const justNavigatedByClickRef = useRef(false);
  const currentPanelElRef = useRef(null);
  const goToTab = useCallback((key) => {
    justNavigatedByClickRef.current = true;
    setTab((prevTab) => {
      const fromIdx = TABS.findIndex((t) => t.key === prevTab);
      const toIdx = TABS.findIndex((t) => t.key === key);
      if (toIdx !== -1 && fromIdx !== -1) setSlideDir(toIdx >= fromIdx ? 1 : -1);
      return key;
    });
  }, []);

  // Only plays the tab-change slide when navigation happened via a tap (goToTab), never after a
  // swipe commit — swipe already reused the same live-dragged DOM node, so no remount/replay here.
  useEffect(() => {
    if (justNavigatedByClickRef.current && currentPanelElRef.current) {
      const el = currentPanelElRef.current;
      el.style.animation = "none";
      void el.offsetWidth; // force reflow so the browser registers the reset before re-adding
      el.style.animation = `${slideDir === 1 ? "ironSlideRight" : "ironSlideLeft"} 180ms ease`;
    }
    justNavigatedByClickRef.current = false;
  }, [tab]);

  const tabBtnRefs = useRef({});
  useEffect(() => {
    const el = tabBtnRefs.current[tab];
    if (el && typeof el.scrollIntoView === "function") {
      el.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
    }
  }, [tab]);

  // ---- swipe-to-change-tabs with a live drag-follow track ----
  const currentIdx = TABS.findIndex((t) => t.key === tab);
  const prevKey = currentIdx > 0 ? TABS[currentIdx - 1].key : null;
  const nextKey = currentIdx < TABS.length - 1 ? TABS[currentIdx + 1].key : null;

  const swipeAreaRef = useRef(null);
  const trackRef = useRef(null);
  const gestureRef = useRef({ startX: 0, startY: 0, active: false, locked: null, containerWidth: 0, dir: 0, lastDx: 0 });
  const [peekDir, setPeekDir] = useState(0);

  const isPageZoomed = () => {
    const vv = window.visualViewport;
    return !!vv && vv.scale > 1.02; // small epsilon to avoid float rounding false-positives
  };

  // touch-action is a static CSS property the browser reads at gesture start — "pan-y" (needed so our
  // JS can own horizontal swipes normally) actively blocks the browser's own native horizontal panning
  // while the user is pinch-zoomed. Track zoom state reactively and relax it to "auto" while zoomed.
  const [isZoomed, setIsZoomed] = useState(false);
  useEffect(() => {
    const vv = window.visualViewport;
    if (!vv) return;
    const update = () => setIsZoomed(vv.scale > 1.02);
    update();
    vv.addEventListener("resize", update);
    vv.addEventListener("scroll", update);
    return () => {
      vv.removeEventListener("resize", update);
      vv.removeEventListener("scroll", update);
    };
  }, []);

  const applyDrag = (dx, g) => {
    const w = g.containerWidth || 1;
    const clamped = g.dir === 1 ? Math.max(dx, -w) : Math.min(dx, w);
    const baseline = g.dir === 1 ? 0 : -w;
    if (trackRef.current) {
      trackRef.current.style.transition = "none";
      trackRef.current.style.transform = `translateX(${baseline + clamped}px)`;
    }
    g.lastDx = clamped;
  };

  const onSwipeStart = useCallback((e) => {
    if (e.touches.length > 1 || isPageZoomed()) {
      gestureRef.current.active = false;
      return;
    }
    const t = e.touches[0];
    gestureRef.current = {
      startX: t.clientX, startY: t.clientY, active: true, locked: null,
      containerWidth: swipeAreaRef.current ? swipeAreaRef.current.offsetWidth : 0,
      dir: 0, lastDx: 0,
    };
  }, []);

  const onSwipeMove = useCallback((e) => {
    const g = gestureRef.current;
    if (!g.active) return;
    if (e.touches.length > 1 || isPageZoomed()) {
      // a second finger came down (pinch) or the page is zoomed — bail and let the browser handle panning
      g.active = false;
      g.locked = "v";
      if (trackRef.current) {
        trackRef.current.style.transition = "none";
        trackRef.current.style.transform = "translateX(0px)";
      }
      setPeekDir(0);
      return;
    }
    const t = e.touches[0];
    const dx = t.clientX - g.startX;
    const dy = t.clientY - g.startY;
    if (g.locked === null) {
      if (Math.abs(dx) < 8 && Math.abs(dy) < 8) return;
      if (Math.abs(dy) >= Math.abs(dx)) { g.locked = "v"; return; }
      g.locked = "h";
      g.dir = dx < 0 ? 1 : -1;
      const hasNeighbor = g.dir === 1 ? !!nextKey : !!prevKey;
      if (!hasNeighbor) { g.locked = "v"; return; }
      setPeekDir(g.dir);
      return;
    }
    if (g.locked !== "h") return;
    applyDrag(dx, g);
  }, [nextKey, prevKey]);

  const onSwipeEnd = useCallback(() => {
    const g = gestureRef.current;
    g.active = false;
    if (g.locked !== "h") return;
    const w = g.containerWidth || 1;
    const dist = Math.abs(g.lastDx || 0);
    const COMMIT_FRACTION = 0.4; // must pull the next tab at least 40% of the way across
    const commit = dist > w * COMMIT_FRACTION;
    const dir = g.dir;
    const targetPx = commit ? (dir === 1 ? -w : 0) : (dir === 1 ? 0 : -w);
    if (trackRef.current) {
      trackRef.current.style.transition = "transform 220ms cubic-bezier(0.22, 1, 0.36, 1)";
      trackRef.current.style.transform = `translateX(${targetPx}px)`;
    }
    setTimeout(() => {
      if (commit) {
        const newKey = dir === 1 ? nextKey : prevKey;
        if (newKey) setTab(newKey);
      }
      setPeekDir(0);
      if (trackRef.current) {
        trackRef.current.style.transition = "none";
        trackRef.current.style.transform = "translateX(0px)";
      }
    }, 230);
  }, [nextKey, prevKey]);

  // native listeners: React's synthetic touch events are registered passive at the root,
  // which is unreliable for this kind of live-tracking drag across mobile browsers.
  useEffect(() => {
    const el = swipeAreaRef.current;
    if (!el) return;
    el.addEventListener("touchstart", onSwipeStart, { passive: true });
    el.addEventListener("touchmove", onSwipeMove, { passive: true });
    el.addEventListener("touchend", onSwipeEnd, { passive: true });
    el.addEventListener("touchcancel", onSwipeEnd, { passive: true });
    return () => {
      el.removeEventListener("touchstart", onSwipeStart);
      el.removeEventListener("touchmove", onSwipeMove);
      el.removeEventListener("touchend", onSwipeEnd);
      el.removeEventListener("touchcancel", onSwipeEnd);
    };
  }, [onSwipeStart, onSwipeMove, onSwipeEnd]);

  const renderTab = (key) => {
    if (key === "log") {
      return <LogTab exercises={exercises} entries={entries} exMap={exMap} unit={unit} addExercise={addExercise} addEntry={addEntry} deleteEntry={deleteEntry} routines={routines} weekPlan={weekPlan} setTab={goToTab} />;
    }
    if (key === "exercises") {
      return <ExercisesTab exercises={exercises} entries={entries} addExercise={addExercise} updateExercise={updateExercise} deleteExercise={deleteExercise} />;
    }
    if (key === "routines") {
      return <RoutinesTab exercises={exercises} exMap={exMap} routines={routines} saveRoutines={saveRoutines} weekPlan={weekPlan} saveWeekPlan={saveWeekPlan} />;
    }
    if (key === "prshelf") {
      return <PRShelfTab exercises={exercises} entries={entries} unit={unit} />;
    }
    if (key === "progress") {
      return <ProgressTab exercises={exercises} entries={entries} unit={unit} />;
    }
    if (key === "volume") {
      return <VolumeTab exercises={exercises} entries={entries} exMap={exMap} unit={unit} />;
    }
    if (key === "history") {
      return <HistoryTab exercises={exercises} entries={entries} exMap={exMap} bwEntries={bwEntries} unit={unit} />;
    }
    if (key === "bodyweight") {
      return <BodyweightTab entries={bwEntries} unit={unit} addBw={addBw} deleteBw={deleteBw} />;
    }
    return <NutritionTab bwEntries={bwEntries} unit={unit} foodEntries={foodEntries} addFood={addFood} deleteFood={deleteFood} profile={profile} saveProfile={saveProfile} />;
  };


  return (
    <div style={{ background: COLORS.bg, color: COLORS.text, minHeight: "100vh", fontFamily: "'Inter', sans-serif" }}>
      <div className="flex items-center justify-between" style={{ padding: "18px 20px 14px", borderBottom: `1px solid ${COLORS.line}`, position: "sticky", top: 0, background: COLORS.bg, zIndex: 10 }}>
        <div className="flex items-center" style={{ gap: 10 }}>
          <div style={{ width: 30, height: 30, borderRadius: 7, background: CATEGORY_COLORS.Push, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <Dumbbell size={16} color="#fff" style={{ strokeWidth: 2.5 }} />
          </div>
          <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 26, letterSpacing: 1.5, lineHeight: 1 }}>IRON LOG</div>
        </div>
        <Segmented options={[{ value: "kg", label: "KG" }, { value: "lb", label: "LB" }]} value={unit} onChange={changeUnit} />
      </div>

      <div className="flex" style={{ padding: "12px 16px 0", gap: 6, borderBottom: `1px solid ${COLORS.line}`, overflowX: "auto", position: "sticky", top: 65, background: COLORS.bg, zIndex: 9 }}>
        {TABS.map((t) => {
          const active = tab === t.key; const Icon = t.icon;
          return (
            <button key={t.key} ref={(el) => { tabBtnRefs.current[t.key] = el; }} onClick={() => goToTab(t.key)} className="flex items-center"
              style={{ gap: 6, padding: "9px 14px", border: "none", background: "transparent", color: active ? COLORS.text : COLORS.textMuted,
                borderBottom: active ? `2px solid ${CATEGORY_COLORS.Push}` : "2px solid transparent", fontFamily: "'IBM Plex Mono', monospace",
                fontSize: 12.5, fontWeight: 600, letterSpacing: 0.6, cursor: "pointer", whiteSpace: "nowrap" }}>
              <Icon size={14} />{t.label.toUpperCase()}
            </button>
          );
        })}
      </div>

      <div
        ref={swipeAreaRef}
        style={{ overflow: "hidden", position: "relative", maxWidth: 900, margin: "0 auto", touchAction: isZoomed ? "auto" : "pan-y" }}
      >
        {!loaded ? (
          <div style={{ padding: 20 }}>
            <div style={{ color: COLORS.textMuted, fontSize: 13, padding: 40, textAlign: "center" }}>Loading your log…</div>
          </div>
        ) : (
          <div ref={trackRef} style={{ display: "flex", alignItems: "flex-start", willChange: "transform" }}>
            {(peekDir === -1 && prevKey ? [prevKey] : []).concat([tab]).concat(peekDir === 1 && nextKey ? [nextKey] : []).map((key) => (
              <div
                key={key}
                ref={key === tab ? currentPanelElRef : null}
                style={{ width: "100%", flexShrink: 0, padding: 20 }}
              >
                {renderTab(key)}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ================= LOG TAB =================
function LogTab({ exercises, entries, exMap, unit, addExercise, addEntry, deleteEntry, routines, weekPlan, setTab }) {
  const [exerciseId, setExerciseId] = useState(exercises[0]?.id || "");
  const [weight, setWeight] = useState("");
  const [reps, setReps] = useState("");
  const [date, setDate] = useState(todayStr());
  const [showAdd, setShowAdd] = useState(false);
  const [newName, setNewName] = useState("");
  const [newMuscle, setNewMuscle] = useState("Chest");

  useEffect(() => { if (!exerciseId && exercises.length) setExerciseId(exercises[0].id); }, [exercises, exerciseId]);

  const weightNum = parseFloat(weight);
  const repsNum = parseInt(reps, 10);
  const canSubmit = exerciseId && weightNum > 0 && repsNum > 0;

  const submit = () => {
    if (!canSubmit) return;
    const weightKg = unit === "kg" ? weightNum : lbToKg(weightNum);
    addEntry({ id: genId(), exerciseId, date, weightKg, reps: repsNum });
    setWeight(""); setReps("");
  };
  const handleAddExercise = () => {
    if (!newName.trim()) return;
    const id = addExercise(newName.trim(), newMuscle);
    setExerciseId(id); setNewName(""); setShowAdd(false);
  };

  const todaysEntries = entries.filter((e) => e.date === date).sort((a, b) => (a.id < b.id ? 1 : -1));
  const cat = categoryOf(exMap[exerciseId]);
  const planDayName = dayNameFromDateStr(date);
  const planRoutineId = weekPlan[planDayName];
  const planRoutine = routines.find((r) => r.id === planRoutineId);
  const doneExerciseIds = new Set(todaysEntries.map((e) => e.exerciseId));
  const lastSession = exerciseId ? getLastSession(entries, exerciseId, date, unit) : null;

  return (
    <div className="flex flex-col" style={{ gap: 20 }}>
      {planRoutine ? (
        <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 10, padding: 16 }}>
          <div className="flex items-center justify-between" style={{ marginBottom: 10 }}>
            <div className="flex items-center" style={{ gap: 7 }}>
              <ListChecks size={14} color={COLORS.textMuted} />
              <span style={{ fontSize: 12, color: COLORS.textMuted, fontFamily: "'IBM Plex Mono', monospace", letterSpacing: 0.5 }}>{planDayName.toUpperCase()}'S PLAN · {planRoutine.name.toUpperCase()}</span>
            </div>
            <span style={{ fontSize: 11, color: COLORS.textFaint }}>{[...doneExerciseIds].filter((id) => planRoutine.items.some((i) => i.exerciseId === id)).length}/{planRoutine.items.length} done</span>
          </div>
          <div className="flex flex-col" style={{ gap: 5 }}>
            {planRoutine.items.map((item) => {
              const ex = exMap[item.exerciseId]; const done = doneExerciseIds.has(item.exerciseId);
              if (!ex) return null;
              return (
                <button key={item.exerciseId} onClick={() => setExerciseId(item.exerciseId)} className="flex items-center justify-between"
                  style={{ width: "100%", background: exerciseId === item.exerciseId ? COLORS.surfaceRaised : "transparent",
                    border: `1px solid ${exerciseId === item.exerciseId ? CATEGORY_COLORS[categoryOf(ex)] : COLORS.line}`, borderRadius: 8, padding: "8px 10px", cursor: "pointer", textAlign: "left" }}>
                  <div className="flex items-center" style={{ gap: 8 }}>
                    {done ? <Check size={15} color={CATEGORY_COLORS.Legs} /> : <Circle size={13} color={COLORS.textFaint} />}
                    <span style={{ fontSize: 13.5, color: done ? COLORS.textMuted : COLORS.text, textDecoration: done ? "line-through" : "none" }}>{ex.name}</span>
                  </div>
                  <span style={{ fontSize: 11, color: COLORS.textFaint, fontFamily: "'IBM Plex Mono', monospace" }}>{item.targetSets}×{item.targetReps}</span>
                </button>
              );
            })}
          </div>
        </div>
      ) : (
        <button onClick={() => setTab("routines")} className="flex items-center justify-between"
          style={{ width: "100%", background: COLORS.surface, border: `1px dashed ${COLORS.line}`, borderRadius: 10, padding: "12px 16px", cursor: "pointer" }}>
          <span style={{ fontSize: 12.5, color: COLORS.textMuted }}>No routine planned for {planDayName}. Set up your week in Routines.</span>
          <ChevronRight size={15} color={COLORS.textFaint} />
        </button>
      )}

      <div className="flex" style={{ gap: 20, flexWrap: "wrap" }}>
        <div style={{ flex: "1 1 280px", background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 10, padding: 16 }}>
          <div className="flex items-center justify-between" style={{ marginBottom: 14 }}>
            <span style={{ fontSize: 12, color: COLORS.textMuted, fontFamily: "'IBM Plex Mono', monospace", letterSpacing: 0.5 }}>NEW SET</span>
            <button onClick={() => setShowAdd((s) => !s)} className="flex items-center" style={{ gap: 4, background: "none", border: "none", color: CATEGORY_COLORS.Pull, fontSize: 12, cursor: "pointer" }}><Plus size={13} /> exercise</button>
          </div>
          {showAdd && (
            <div style={{ marginBottom: 14, padding: 12, background: COLORS.surfaceRaised, borderRadius: 8, border: `1px solid ${COLORS.line}` }}>
              <input value={newName} onChange={(e) => setNewName(e.target.value)} placeholder="Exercise name" style={{ width: "100%", padding: "8px 10px", borderRadius: 6, border: `1px solid ${COLORS.line}`, background: COLORS.surface, color: COLORS.text, fontSize: 13, marginBottom: 8 }} />
              <label style={{ fontSize: 10.5, color: COLORS.textMuted }}>Main muscle worked</label>
              <select value={newMuscle} onChange={(e) => setNewMuscle(e.target.value)} style={{ width: "100%", padding: "7px 9px", marginTop: 4, borderRadius: 6, border: `1px solid ${COLORS.line}`, background: COLORS.surface, color: COLORS.text, fontSize: 12.5 }}>
                {CATEGORIES.map((c) => (<optgroup key={c} label={c}>{MUSCLE_GROUPS[c].map((m) => <option key={m} value={m}>{m}</option>)}</optgroup>))}
              </select>
              <button onClick={handleAddExercise} style={{ marginTop: 10, width: "100%", padding: "8px 0", borderRadius: 6, border: "none", background: COLORS.text, color: COLORS.bg, fontWeight: 600, fontSize: 12.5, cursor: "pointer" }}>Add exercise</button>
            </div>
          )}
          <label style={{ fontSize: 11, color: COLORS.textMuted }}>Exercise</label>
          <select value={exerciseId} onChange={(e) => setExerciseId(e.target.value)} style={{ width: "100%", padding: "9px 10px", marginTop: 5, marginBottom: 12, borderRadius: 7, border: `1px solid ${COLORS.line}`, background: COLORS.surfaceRaised, color: COLORS.text, fontSize: 13.5 }}>
            {CATEGORIES.map((c) => (<optgroup key={c} label={c}>{exercises.filter((e) => categoryOf(e) === c).map((e) => (<option key={e.id} value={e.id}>{e.name} · {e.muscle}</option>))}</optgroup>))}
          </select>
          {lastSession && (
            <div style={{ marginBottom: 12, padding: "8px 10px", background: COLORS.surfaceRaised, borderRadius: 7, border: `1px solid ${COLORS.line}` }}>
              <div style={{ fontSize: 10, color: COLORS.textFaint, fontFamily: "'IBM Plex Mono', monospace", letterSpacing: 0.4, marginBottom: 3 }}>LAST TIME · {lastSession.date}</div>
              <div style={{ fontSize: 12.5, color: COLORS.textMuted, fontFamily: "'IBM Plex Mono', monospace" }}>
                {lastSession.sets.map((s, i) => `${fmt(s.weight)}${unit}×${s.reps}`).join("   ")}
              </div>
            </div>
          )}
          <div className="flex" style={{ gap: 10, marginBottom: 12 }}>
            <div style={{ flex: 1 }}>
              <label style={{ fontSize: 11, color: COLORS.textMuted }}>Weight ({unit})</label>
              <input type="number" inputMode="decimal" value={weight} onChange={(e) => setWeight(e.target.value)} placeholder="0" style={{ width: "100%", padding: "9px 10px", marginTop: 5, borderRadius: 7, border: `1px solid ${COLORS.line}`, background: COLORS.surfaceRaised, color: COLORS.text, fontSize: 15, fontFamily: "'IBM Plex Mono', monospace" }} />
            </div>
            <div style={{ flex: 1 }}>
              <label style={{ fontSize: 11, color: COLORS.textMuted }}>Reps</label>
              <input type="number" inputMode="numeric" value={reps} onChange={(e) => setReps(e.target.value)} placeholder="0" style={{ width: "100%", padding: "9px 10px", marginTop: 5, borderRadius: 7, border: `1px solid ${COLORS.line}`, background: COLORS.surfaceRaised, color: COLORS.text, fontSize: 15, fontFamily: "'IBM Plex Mono', monospace" }} />
            </div>
          </div>
          <label style={{ fontSize: 11, color: COLORS.textMuted }}>Date</label>
          <input type="date" value={date} onChange={(e) => setDate(e.target.value)} style={{ width: "100%", padding: "8px 10px", marginTop: 5, marginBottom: 14, borderRadius: 7, border: `1px solid ${COLORS.line}`, background: COLORS.surfaceRaised, color: COLORS.text, fontSize: 13 }} />
          <button onClick={submit} disabled={!canSubmit} style={{ width: "100%", padding: "11px 0", borderRadius: 8, border: "none", background: canSubmit ? CATEGORY_COLORS[cat] : COLORS.line, color: canSubmit ? "#fff" : COLORS.textFaint, fontWeight: 700, fontSize: 13.5, letterSpacing: 0.4, cursor: canSubmit ? "pointer" : "not-allowed" }}>LOG SET</button>
        </div>

        <div style={{ flex: "1 1 220px", background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 10, padding: 16, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
          <span style={{ fontSize: 12, color: COLORS.textMuted, fontFamily: "'IBM Plex Mono', monospace", letterSpacing: 0.5, marginBottom: 10, alignSelf: "flex-start" }}>BAR LOAD (per side)</span>
          <PlateStack weight={weightNum > 0 ? weightNum : (unit === "kg" ? BAR_KG : BAR_LB)} unit={unit} />
          <div style={{ marginTop: 8, fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, color: COLORS.textFaint, textAlign: "center" }}>bar = {unit === "kg" ? BAR_KG : BAR_LB}{unit}</div>
        </div>
      </div>

      <div>
        <div style={{ fontSize: 12, color: COLORS.textMuted, fontFamily: "'IBM Plex Mono', monospace", letterSpacing: 0.5, marginBottom: 10 }}>SETS · {date === todayStr() ? "TODAY" : date}</div>
        {todaysEntries.length === 0 ? (
          <div style={{ color: COLORS.textFaint, fontSize: 13, padding: "10px 2px" }}>No sets logged for this date yet.</div>
        ) : (
          <div className="flex flex-col" style={{ gap: 6 }}>
            {todaysEntries.map((e) => {
              const ex = exMap[e.exerciseId]; const w = unit === "kg" ? e.weightKg : kgToLb(e.weightKg);
              const badge = getSetBadge(entries, e.exerciseId, e.date, w, e.reps, unit);
              return (
                <div key={e.id} className="flex items-center justify-between" style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 8, padding: "9px 12px" }}>
                  <div className="flex items-center" style={{ gap: 10 }}>
                    <div style={{ width: 7, height: 7, borderRadius: 99, background: CATEGORY_COLORS[categoryOf(ex)] }} />
                    <span style={{ fontSize: 13.5 }}>{ex?.name || "Unknown"}</span>
                    {badge?.type === "pr" && (
                      <span className="flex items-center" style={{ gap: 3, fontSize: 10, fontWeight: 700, color: CATEGORY_COLORS.Legs, background: CATEGORY_COLORS.Legs + "22", padding: "2px 7px", borderRadius: 99 }}>
                        <Trophy size={10} /> PR
                      </span>
                    )}
                    {badge?.type === "up" && (
                      <span style={{ fontSize: 10, fontWeight: 700, color: CATEGORY_COLORS.Core, background: CATEGORY_COLORS.Core + "22", padding: "2px 7px", borderRadius: 99 }}>▲ Improved</span>
                    )}
                    {badge?.type === "match" && (
                      <span style={{ fontSize: 10, color: COLORS.textFaint, background: COLORS.surfaceRaised, padding: "2px 7px", borderRadius: 99 }}>= Matched</span>
                    )}
                  </div>
                  <div className="flex items-center" style={{ gap: 12 }}>
                    <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 13, color: COLORS.textMuted }}>{fmt(w)}{unit} × {e.reps}</span>
                    <button onClick={() => deleteEntry(e.id)} style={{ background: "none", border: "none", color: COLORS.textFaint, cursor: "pointer" }}><Trash2 size={14} /></button>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ================= ROUTINES TAB =================
function RoutinesTab({ exercises, exMap, routines, saveRoutines, weekPlan, saveWeekPlan }) {
  const [view, setView] = useState("routines");
  const [building, setBuilding] = useState(false);
  const [name, setName] = useState("");
  const [items, setItems] = useState([]);
  const [pickExercise, setPickExercise] = useState(exercises[0]?.id || "");

  const resetBuilder = () => { setName(""); setItems([]); setBuilding(false); };
  const addItem = () => { if (!pickExercise || items.some((i) => i.exerciseId === pickExercise)) return; setItems((prev) => [...prev, { exerciseId: pickExercise, targetSets: 3, targetReps: 8 }]); };
  const updateItem = (exerciseId, field, value) => setItems((prev) => prev.map((i) => (i.exerciseId === exerciseId ? { ...i, [field]: value } : i)));
  const removeItem = (exerciseId) => setItems((prev) => prev.filter((i) => i.exerciseId !== exerciseId));
  const saveRoutine = () => { if (!name.trim() || items.length === 0) return; saveRoutines([...routines, { id: genId(), name: name.trim(), items }]); resetBuilder(); };
  const deleteRoutine = (id) => {
    saveRoutines(routines.filter((r) => r.id !== id));
    const nextPlan = { ...weekPlan };
    for (const d of DAYS) if (nextPlan[d] === id) nextPlan[d] = "";
    saveWeekPlan(nextPlan);
  };

  return (
    <div className="flex flex-col" style={{ gap: 18 }}>
      <Segmented options={[{ value: "routines", label: "My Routines" }, { value: "planner", label: "Week Planner" }]} value={view} onChange={setView} />
      {view === "routines" ? (
        <div className="flex flex-col" style={{ gap: 14 }}>
          {routines.length === 0 && !building && <EmptyState icon={ListChecks} title="NO ROUTINES YET" body="Build a routine — like Push Day or Leg Day — and reuse it every week." />}
          {routines.map((r) => (
            <div key={r.id} style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 10, padding: 14 }}>
              <div className="flex items-center justify-between" style={{ marginBottom: 8 }}>
                <span style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 18, letterSpacing: 0.5 }}>{r.name}</span>
                <button onClick={() => deleteRoutine(r.id)} style={{ background: "none", border: "none", color: COLORS.textFaint, cursor: "pointer" }}><Trash2 size={14} /></button>
              </div>
              <div className="flex" style={{ gap: 6, flexWrap: "wrap" }}>
                {r.items.map((it) => { const ex = exMap[it.exerciseId]; if (!ex) return null; return (
                  <span key={it.exerciseId} style={{ fontSize: 11.5, padding: "4px 9px", borderRadius: 99, border: `1px solid ${CATEGORY_COLORS[categoryOf(ex)]}55`, color: CATEGORY_COLORS[categoryOf(ex)], fontFamily: "'IBM Plex Mono', monospace" }}>{ex.name} {it.targetSets}×{it.targetReps}</span>
                ); })}
              </div>
            </div>
          ))}
          {building ? (
            <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 10, padding: 16 }}>
              <input value={name} onChange={(e) => setName(e.target.value)} placeholder="Routine name — e.g. Push Day A" style={{ width: "100%", padding: "9px 10px", borderRadius: 7, border: `1px solid ${COLORS.line}`, background: COLORS.surfaceRaised, color: COLORS.text, fontSize: 14, marginBottom: 12 }} />
              <div className="flex flex-col" style={{ gap: 6, marginBottom: 12 }}>
                {items.map((it) => { const ex = exMap[it.exerciseId]; return (
                  <div key={it.exerciseId} className="flex items-center" style={{ gap: 8, background: COLORS.surfaceRaised, borderRadius: 7, padding: "7px 9px" }}>
                    <span style={{ flex: 1, fontSize: 13 }}>{ex?.name}</span>
                    <input type="number" value={it.targetSets} onChange={(e) => updateItem(it.exerciseId, "targetSets", parseInt(e.target.value) || 0)} style={{ width: 40, padding: "4px 6px", borderRadius: 5, border: `1px solid ${COLORS.line}`, background: COLORS.surface, color: COLORS.text, fontSize: 12, fontFamily: "'IBM Plex Mono', monospace" }} />
                    <span style={{ fontSize: 11, color: COLORS.textFaint }}>sets ×</span>
                    <input type="number" value={it.targetReps} onChange={(e) => updateItem(it.exerciseId, "targetReps", parseInt(e.target.value) || 0)} style={{ width: 40, padding: "4px 6px", borderRadius: 5, border: `1px solid ${COLORS.line}`, background: COLORS.surface, color: COLORS.text, fontSize: 12, fontFamily: "'IBM Plex Mono', monospace" }} />
                    <span style={{ fontSize: 11, color: COLORS.textFaint }}>reps</span>
                    <button onClick={() => removeItem(it.exerciseId)} style={{ background: "none", border: "none", color: COLORS.textFaint, cursor: "pointer" }}><X size={13} /></button>
                  </div>
                ); })}
              </div>
              <div className="flex items-center" style={{ gap: 8, marginBottom: 14 }}>
                <select value={pickExercise} onChange={(e) => setPickExercise(e.target.value)} style={{ flex: 1, padding: "8px 10px", borderRadius: 7, border: `1px solid ${COLORS.line}`, background: COLORS.surfaceRaised, color: COLORS.text, fontSize: 13 }}>
                  {CATEGORIES.map((c) => (<optgroup key={c} label={c}>{exercises.filter((e) => categoryOf(e) === c).map((e) => <option key={e.id} value={e.id}>{e.name} · {e.muscle}</option>)}</optgroup>))}
                </select>
                <button onClick={addItem} className="flex items-center" style={{ gap: 4, padding: "8px 12px", borderRadius: 7, border: `1px solid ${COLORS.line}`, background: COLORS.surfaceRaised, color: COLORS.text, fontSize: 12.5, cursor: "pointer" }}><Plus size={13} /> Add</button>
              </div>
              <div className="flex" style={{ gap: 8 }}>
                <button onClick={saveRoutine} disabled={!name.trim() || items.length === 0} style={{ flex: 1, padding: "10px 0", borderRadius: 8, border: "none", background: name.trim() && items.length ? COLORS.text : COLORS.line, color: name.trim() && items.length ? COLORS.bg : COLORS.textFaint, fontWeight: 700, fontSize: 13, cursor: name.trim() && items.length ? "pointer" : "not-allowed" }}>Save Routine</button>
                <button onClick={resetBuilder} style={{ padding: "10px 16px", borderRadius: 8, border: `1px solid ${COLORS.line}`, background: "transparent", color: COLORS.textMuted, fontSize: 13, cursor: "pointer" }}>Cancel</button>
              </div>
            </div>
          ) : (
            <button onClick={() => setBuilding(true)} className="flex items-center justify-center" style={{ gap: 6, padding: "12px 0", borderRadius: 8, border: `1px dashed ${COLORS.line}`, background: "transparent", color: COLORS.textMuted, fontSize: 13, cursor: "pointer" }}><Plus size={14} /> New routine</button>
          )}
        </div>
      ) : (
        <div className="flex flex-col" style={{ gap: 8 }}>
          {routines.length === 0 && <EmptyState icon={CalendarDays} title="BUILD A ROUTINE FIRST" body="Create at least one routine before planning your week." />}
          {DAYS.map((d) => (
            <div key={d} className="flex items-center justify-between" style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 8, padding: "10px 14px" }}>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 13, fontWeight: 600, width: 44 }}>{d}</span>
              <select value={weekPlan[d] || ""} onChange={(e) => saveWeekPlan({ ...weekPlan, [d]: e.target.value })} style={{ flex: 1, marginLeft: 12, padding: "7px 10px", borderRadius: 7, border: `1px solid ${COLORS.line}`, background: COLORS.surfaceRaised, color: COLORS.text, fontSize: 13 }}>
                <option value="">Rest day</option>
                {routines.map((r) => <option key={r.id} value={r.id}>{r.name}</option>)}
              </select>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ================= PR SHELF TAB =================
function PRShelfTab({ exercises, entries, unit }) {
  const prs = useMemo(() => {
    const map = {};
    for (const e of entries) {
      const w = unit === "kg" ? e.weightKg : kgToLb(e.weightKg);
      const cur = map[e.exerciseId];
      if (!cur || w > cur.weight || (w === cur.weight && e.reps > cur.reps)) map[e.exerciseId] = { weight: w, reps: e.reps, date: e.date };
    }
    return map;
  }, [entries, unit]);

  const withPRs = exercises.filter((e) => prs[e.id]).sort((a, b) => prs[b.id].weight - prs[a.id].weight);
  if (withPRs.length === 0) return <EmptyState icon={Trophy} title="THE SHELF IS EMPTY" body="Log some heavy sets and your personal records will land here." />;

  return (
    <div className="flex flex-col" style={{ gap: 18 }}>
      <div style={{ fontSize: 12, color: COLORS.textMuted, fontFamily: "'IBM Plex Mono', monospace", letterSpacing: 0.5 }}>HEAVIEST SINGLE SET PER EXERCISE</div>
      {CATEGORIES.map((cat) => {
        const inCat = withPRs.filter((e) => categoryOf(e) === cat);
        if (inCat.length === 0) return null;
        return (
          <div key={cat}>
            <div className="flex items-center" style={{ gap: 7, marginBottom: 8 }}>
              <div style={{ width: 8, height: 8, borderRadius: 99, background: CATEGORY_COLORS[cat] }} />
              <span style={{ fontSize: 12.5, fontWeight: 600, color: CATEGORY_COLORS[cat] }}>{cat.toUpperCase()}</span>
            </div>
            <div className="flex" style={{ gap: 10, flexWrap: "wrap" }}>
              {inCat.map((ex) => { const pr = prs[ex.id]; return (
                <div key={ex.id} style={{ flex: "1 1 200px", background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderTop: `3px solid ${CATEGORY_COLORS[cat]}`, borderRadius: 10, padding: 14 }}>
                  <div className="flex items-center justify-between" style={{ marginBottom: 6 }}>
                    <span style={{ fontSize: 13, color: COLORS.text }}>{ex.name}</span>
                    <Trophy size={14} color={CATEGORY_COLORS[cat]} />
                  </div>
                  <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 28, letterSpacing: 0.5 }}>{fmt(pr.weight)}{unit} <span style={{ fontSize: 15, color: COLORS.textMuted, fontFamily: "'IBM Plex Mono', monospace" }}>× {pr.reps}</span></div>
                  <div style={{ fontSize: 11, color: COLORS.textFaint, marginTop: 2 }}>{pr.date}</div>
                </div>
              ); })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ================= PROGRESS TAB =================
function ProgressTab({ exercises, entries, unit }) {
  const [exerciseId, setExerciseId] = useState(exercises[0]?.id || "");
  useEffect(() => { if (!exerciseId && exercises.length) setExerciseId(exercises[0].id); }, [exercises, exerciseId]);
  const exEntries = entries.filter((e) => e.exerciseId === exerciseId);

  const byDate = useMemo(() => {
    const map = {};
    for (const e of exEntries) {
      const w = unit === "kg" ? e.weightKg : kgToLb(e.weightKg);
      const e1rm = epley1RM(w, e.reps);
      if (!map[e.date] || e1rm > map[e.date].e1rm) map[e.date] = { date: e.date, topWeight: w, reps: e.reps, e1rm };
    }
    return Object.values(map).sort((a, b) => a.date.localeCompare(b.date));
  }, [exEntries, unit]);

  const pr = byDate.reduce((best, d) => (!best || d.e1rm > best.e1rm ? d : best), null);
  const trend = useMemo(() => computeTrendStatus(byDate), [byDate]);
  const TREND_STYLE = {
    progressing: { icon: TrendingUp, color: CATEGORY_COLORS.Core },
    steady: { icon: Minus, color: COLORS.textMuted },
    declining: { icon: TrendingDown, color: CATEGORY_COLORS.Push },
    new: { icon: Minus, color: COLORS.textFaint },
  };

  return (
    <div className="flex flex-col" style={{ gap: 16 }}>
      <select value={exerciseId} onChange={(e) => setExerciseId(e.target.value)} style={{ padding: "9px 10px", borderRadius: 7, border: `1px solid ${COLORS.line}`, background: COLORS.surfaceRaised, color: COLORS.text, fontSize: 13.5, maxWidth: 320 }}>
        {CATEGORIES.map((c) => (<optgroup key={c} label={c}>{exercises.filter((e) => categoryOf(e) === c).map((e) => (<option key={e.id} value={e.id}>{e.name} · {e.muscle}</option>))}</optgroup>))}
      </select>
      {byDate.length === 0 ? (
        <EmptyState icon={TrendingUp} title="NO DATA YET" body="Log a few sets for this exercise on the Log tab and your progress curve will show up here." />
      ) : (
        <>
          {byDate.length >= 2 && (() => {
            const t = TREND_STYLE[trend.status]; const TrendIcon = t.icon;
            return (
              <div className="flex items-center" style={{ gap: 6, alignSelf: "flex-start", padding: "6px 12px", borderRadius: 99, background: t.color + "1a", border: `1px solid ${t.color}55` }}>
                <TrendIcon size={13} color={t.color} />
                <span style={{ fontSize: 12, fontWeight: 600, color: t.color }}>{trend.label}</span>
              </div>
            );
          })()}
          {pr && (
            <div className="flex" style={{ gap: 12, flexWrap: "wrap" }}>
              <StatCard label="EST. 1RM PR" value={`${fmt(pr.e1rm)}${unit}`} sub={pr.date} color={CATEGORY_COLORS.Push} />
              <StatCard label="TOP SET WEIGHT" value={`${fmt(pr.topWeight)}${unit} × ${pr.reps}`} sub="on PR day" color={CATEGORY_COLORS.Pull} />
              <StatCard label="SESSIONS LOGGED" value={byDate.length} sub="total dates" color={CATEGORY_COLORS.Legs} />
            </div>
          )}
          <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 10, padding: "16px 8px 8px" }}>
            <ChartLegend items={[{ label: "Est. 1RM", color: CATEGORY_COLORS.Push }, { label: "Top set", color: CATEGORY_COLORS.Pull, dashed: true }]} />
            <SimpleLineChart data={byDate} xKey="date" unit={unit} lines={[{ dataKey: "e1rm", color: CATEGORY_COLORS.Push, label: "Est. 1RM" }, { dataKey: "topWeight", color: CATEGORY_COLORS.Pull, label: "Top set", dashed: true }]} />
          </div>
        </>
      )}
    </div>
  );
}

// ================= VOLUME TAB =================
function VolumeTab({ exercises, entries, exMap, unit }) {
  const [view, setView] = useState("category"); // category | muscle

  const weeklyData = useMemo(() => {
    const weekMap = {};
    for (const e of entries) {
      const ex = exMap[e.exerciseId]; const cat = categoryOf(ex);
      const musc = ex?.muscle || "Other";
      const w = unit === "kg" ? e.weightKg : kgToLb(e.weightKg);
      const vol = w * e.reps; const wk = isoWeekKey(e.date);
      if (!weekMap[wk]) weekMap[wk] = { week: wk };
      weekMap[wk][cat] = (weekMap[wk][cat] || 0) + vol;
      weekMap[wk]["m:" + musc] = (weekMap[wk]["m:" + musc] || 0) + vol;
    }
    return Object.values(weekMap).sort((a, b) => a.week.localeCompare(b.week)).slice(-12);
  }, [entries, exMap, unit]);

  const totalThisWeek = useMemo(() => {
    const wk = isoWeekKey(todayStr()); const row = weeklyData.find((d) => d.week === wk);
    if (!row) return 0;
    return CATEGORIES.reduce((s, c) => s + (row[c] || 0), 0);
  }, [weeklyData]);

  const categoryTotals = useMemo(() => {
    const totals = {};
    for (const e of entries) {
      const ex = exMap[e.exerciseId]; const cat = categoryOf(ex);
      const w = unit === "kg" ? e.weightKg : kgToLb(e.weightKg);
      totals[cat] = (totals[cat] || 0) + w * e.reps;
    }
    return totals;
  }, [entries, exMap, unit]);

  const muscleTotals = useMemo(() => {
    const totals = {};
    for (const e of entries) {
      const ex = exMap[e.exerciseId]; const musc = ex?.muscle || "Other";
      const w = unit === "kg" ? e.weightKg : kgToLb(e.weightKg);
      totals[musc] = (totals[musc] || 0) + w * e.reps;
    }
    return totals;
  }, [entries, exMap, unit]);

  const grandTotal = Object.values(categoryTotals).reduce((a, b) => a + b, 0);
  const musclesPresent = MUSCLE_LIST.filter((m) => muscleTotals[m.muscle]);

  if (entries.length === 0) return <EmptyState icon={LayoutGrid} title="NO VOLUME YET" body="Once you log sets, weekly volume grouped by muscle group will show up here." />;

  const barSeries = view === "category"
    ? CATEGORIES.filter((c) => categoryTotals[c]).map((c) => ({ dataKey: c, color: CATEGORY_COLORS[c], label: c }))
    : musclesPresent.map((m) => ({ dataKey: "m:" + m.muscle, color: MUSCLE_COLORS[m.muscle], label: m.muscle }));

  return (
    <div className="flex flex-col" style={{ gap: 16 }}>
      <div className="flex" style={{ gap: 12, flexWrap: "wrap" }}>
        <StatCard label="THIS WEEK'S VOLUME" value={`${Math.round(totalThisWeek).toLocaleString()}${unit}`} sub={isoWeekKey(todayStr())} color={CATEGORY_COLORS.Push} />
        <StatCard label="ALL-TIME VOLUME" value={`${Math.round(grandTotal).toLocaleString()}${unit}`} sub={`${entries.length} sets logged`} color={CATEGORY_COLORS.Pull} />
      </div>

      <Segmented options={[{ value: "category", label: "By Category" }, { value: "muscle", label: "By Muscle" }]} value={view} onChange={setView} />

      <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 10, padding: "16px 8px 8px" }}>
        <div style={{ fontSize: 12, color: COLORS.textMuted, fontFamily: "'IBM Plex Mono', monospace", letterSpacing: 0.5, padding: "0 12px 6px" }}>VOLUME BY WEEK · {view === "category" ? "BY CATEGORY" : "BY MUSCLE"}</div>
        <ChartLegend items={barSeries.map((s) => ({ label: s.label, color: s.color }))} />
        <SimpleStackedBarChart data={weeklyData} xKey="week" unit={unit} series={barSeries} />
      </div>

      <div>
        <div style={{ fontSize: 12, color: COLORS.textMuted, fontFamily: "'IBM Plex Mono', monospace", letterSpacing: 0.5, marginBottom: 10 }}>
          ALL-TIME SHARE {view === "category" ? "BY CATEGORY" : "BY MUSCLE"}
        </div>
        {view === "category" ? (
          <div className="flex" style={{ gap: 10, flexWrap: "wrap" }}>
            {CATEGORIES.filter((c) => categoryTotals[c]).map((c) => {
              const pct = grandTotal ? (categoryTotals[c] / grandTotal) * 100 : 0;
              return (
                <div key={c} style={{ flex: "1 1 140px", background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 10, padding: 12 }}>
                  <div className="flex items-center justify-between" style={{ marginBottom: 6 }}>
                    <span style={{ fontSize: 12, fontWeight: 600, color: CATEGORY_COLORS[c] }}>{c}</span>
                    <span style={{ fontSize: 11, color: COLORS.textFaint }}>{fmt(pct)}% · {Math.round(categoryTotals[c]).toLocaleString()}{unit}</span>
                  </div>
                  <div style={{ height: 5, background: COLORS.surfaceRaised, borderRadius: 3, overflow: "hidden" }}>
                    <div style={{ width: `${pct}%`, height: "100%", background: CATEGORY_COLORS[c] }} />
                  </div>
                </div>
              );
            })}
          </div>
        ) : (
          <div className="flex flex-col" style={{ gap: 16 }}>
            {CATEGORIES.map((cat) => {
              const muscles = musclesPresent.filter((m) => m.category === cat);
              if (muscles.length === 0) return null;
              const catTotal = categoryTotals[cat] || 0;
              return (
                <div key={cat}>
                  <div className="flex items-center" style={{ gap: 7, marginBottom: 8 }}>
                    <div style={{ width: 8, height: 8, borderRadius: 99, background: CATEGORY_COLORS[cat] }} />
                    <span style={{ fontSize: 12.5, fontWeight: 600, color: CATEGORY_COLORS[cat] }}>{cat.toUpperCase()}</span>
                    <span style={{ fontSize: 11, color: COLORS.textFaint }}>· {Math.round(catTotal).toLocaleString()}{unit} total</span>
                  </div>
                  <div className="flex" style={{ gap: 10, flexWrap: "wrap" }}>
                    {muscles.map((m) => {
                      const val = muscleTotals[m.muscle];
                      const pct = catTotal ? (val / catTotal) * 100 : 0;
                      return (
                        <div key={m.muscle} style={{ flex: "1 1 140px", background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 10, padding: 12 }}>
                          <div className="flex items-center justify-between" style={{ marginBottom: 6 }}>
                            <span style={{ fontSize: 12, fontWeight: 600, color: MUSCLE_COLORS[m.muscle] }}>{m.muscle}</span>
                            <span style={{ fontSize: 11, color: COLORS.textFaint }}>{fmt(pct)}%</span>
                          </div>
                          <div style={{ height: 5, background: COLORS.surfaceRaised, borderRadius: 3, overflow: "hidden" }}>
                            <div style={{ width: `${pct}%`, height: "100%", background: MUSCLE_COLORS[m.muscle] }} />
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ================= BODYWEIGHT TAB =================
function BodyweightTab({ entries, unit, addBw, deleteBw }) {
  const [weight, setWeight] = useState("");
  const [date, setDate] = useState(todayStr());
  const submit = () => {
    const w = parseFloat(weight); if (!(w > 0)) return;
    const weightKg = unit === "kg" ? w : lbToKg(w);
    addBw({ id: genId(), date, weightKg }); setWeight("");
  };
  const data = entries.map((e) => ({ date: e.date, id: e.id, weight: unit === "kg" ? e.weightKg : kgToLb(e.weightKg) }));
  const latest = data[data.length - 1]; const first = data[0];
  const change = latest && first ? latest.weight - first.weight : 0;

  return (
    <div className="flex flex-col" style={{ gap: 16 }}>
      <div className="flex" style={{ gap: 20, flexWrap: "wrap" }}>
        <div style={{ flex: "1 1 240px", background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 10, padding: 16 }}>
          <div style={{ fontSize: 12, color: COLORS.textMuted, fontFamily: "'IBM Plex Mono', monospace", letterSpacing: 0.5, marginBottom: 12 }}>LOG BODYWEIGHT</div>
          <div className="flex" style={{ gap: 10, marginBottom: 12 }}>
            <div style={{ flex: 1 }}>
              <label style={{ fontSize: 11, color: COLORS.textMuted }}>Weight ({unit})</label>
              <input type="number" inputMode="decimal" value={weight} onChange={(e) => setWeight(e.target.value)} placeholder="0" style={{ width: "100%", padding: "9px 10px", marginTop: 5, borderRadius: 7, border: `1px solid ${COLORS.line}`, background: COLORS.surfaceRaised, color: COLORS.text, fontSize: 15, fontFamily: "'IBM Plex Mono', monospace" }} />
            </div>
            <div style={{ flex: 1 }}>
              <label style={{ fontSize: 11, color: COLORS.textMuted }}>Date</label>
              <input type="date" value={date} onChange={(e) => setDate(e.target.value)} style={{ width: "100%", padding: "9px 10px", marginTop: 5, borderRadius: 7, border: `1px solid ${COLORS.line}`, background: COLORS.surfaceRaised, color: COLORS.text, fontSize: 13 }} />
            </div>
          </div>
          <button onClick={submit} disabled={!(parseFloat(weight) > 0)} style={{ width: "100%", padding: "11px 0", borderRadius: 8, border: "none", background: parseFloat(weight) > 0 ? CATEGORY_COLORS.Legs : COLORS.line, color: parseFloat(weight) > 0 ? "#fff" : COLORS.textFaint, fontWeight: 700, fontSize: 13.5, cursor: parseFloat(weight) > 0 ? "pointer" : "not-allowed" }}>LOG WEIGHT</button>
        </div>
        {latest && (
          <div className="flex" style={{ gap: 12, flex: "1 1 240px", flexWrap: "wrap" }}>
            <StatCard label="LATEST" value={`${fmt(latest.weight)}${unit}`} sub={latest.date} color={CATEGORY_COLORS.Legs} />
            <StatCard label="CHANGE" value={`${change >= 0 ? "+" : ""}${fmt(change)}${unit}`} sub={`since ${first.date}`} color={change >= 0 ? CATEGORY_COLORS.Push : CATEGORY_COLORS.Pull} />
          </div>
        )}
      </div>
      {data.length === 0 ? (
        <EmptyState icon={Scale} title="NO ENTRIES YET" body="Log your bodyweight regularly to see your trend over time." />
      ) : (
        <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 10, padding: "16px 8px 8px" }}>
          <SimpleLineChart data={data} xKey="date" unit={unit} lines={[{ dataKey: "weight", color: CATEGORY_COLORS.Legs, label: "Bodyweight" }]} />
        </div>
      )}
      {data.length > 0 && (
        <div className="flex flex-col" style={{ gap: 6 }}>
          {[...data].reverse().slice(0, 8).map((d) => (
            <div key={d.id} className="flex items-center justify-between" style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 8, padding: "8px 12px" }}>
              <span style={{ fontSize: 13, color: COLORS.textMuted }}>{d.date}</span>
              <div className="flex items-center" style={{ gap: 12 }}>
                <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 13 }}>{fmt(d.weight)}{unit}</span>
                <button onClick={() => deleteBw(d.id)} style={{ background: "none", border: "none", color: COLORS.textFaint, cursor: "pointer" }}><Trash2 size={14} /></button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ================= NUTRITION TAB =================
function NutritionTab({ bwEntries, unit, foodEntries, addFood, deleteFood, profile, saveProfile }) {
  const [date, setDate] = useState(todayStr());
  const [name, setName] = useState("");
  const [calories, setCalories] = useState("");
  const [protein, setProtein] = useState("");
  const [carbs, setCarbs] = useState("");
  const [fat, setFat] = useState("");

  const latestWeightKg = bwEntries.length ? bwEntries[bwEntries.length - 1].weightKg : null;
  const activity = ACTIVITY_LEVELS.find((a) => a.value === profile.activityLevel) || ACTIVITY_LEVELS[2];
  const goal = GOALS.find((g) => g.value === profile.goal) || GOALS[1];

  const bmr = latestWeightKg ? calcBMR(latestWeightKg, profile.heightCm, profile.age, profile.sex) : null;
  const tdee = bmr ? bmr * activity.mult : null;
  const target = tdee ? tdee + goal.delta : null;

  const { ft, inch } = cmToFtIn(profile.heightCm);

  const submitFood = () => {
    const cal = parseFloat(calories);
    if (!name.trim() || !(cal >= 0)) return;
    addFood({
      id: genId(), date, name: name.trim(),
      calories: cal,
      protein: parseFloat(protein) || 0,
      carbs: parseFloat(carbs) || 0,
      fat: parseFloat(fat) || 0,
    });
    setName(""); setCalories(""); setProtein(""); setCarbs(""); setFat("");
  };

  const todaysFood = foodEntries.filter((f) => f.date === date).sort((a, b) => (a.id < b.id ? 1 : -1));
  const totals = todaysFood.reduce((acc, f) => ({
    calories: acc.calories + f.calories, protein: acc.protein + f.protein, carbs: acc.carbs + f.carbs, fat: acc.fat + f.fat,
  }), { calories: 0, protein: 0, carbs: 0, fat: 0 });

  const macroCals = { protein: totals.protein * 4, carbs: totals.carbs * 4, fat: totals.fat * 9 };
  const macroTotal = macroCals.protein + macroCals.carbs + macroCals.fat;

  const calPct = target ? Math.min(150, (totals.calories / target) * 100) : 0;
  const overTarget = target && totals.calories > target;

  return (
    <div className="flex flex-col" style={{ gap: 20 }}>
      <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 10, padding: 16 }}>
        <div style={{ fontSize: 12, color: COLORS.textMuted, fontFamily: "'IBM Plex Mono', monospace", letterSpacing: 0.5, marginBottom: 12 }}>PROFILE &amp; TARGETS</div>

        <div className="flex" style={{ gap: 10, flexWrap: "wrap", marginBottom: 12 }}>
          <div style={{ flex: "1 1 140px" }}>
            <label style={{ fontSize: 11, color: COLORS.textMuted }}>Height</label>
            {unit === "kg" ? (
              <input type="number" value={profile.heightCm} onChange={(e) => saveProfile({ ...profile, heightCm: parseFloat(e.target.value) || 0 })}
                style={{ width: "100%", padding: "9px 10px", marginTop: 5, borderRadius: 7, border: `1px solid ${COLORS.line}`, background: COLORS.surfaceRaised, color: COLORS.text, fontSize: 14, fontFamily: "'IBM Plex Mono', monospace" }} />
            ) : (
              <div className="flex" style={{ gap: 6, marginTop: 5 }}>
                <input type="number" value={ft} onChange={(e) => saveProfile({ ...profile, heightCm: ftInToCm(parseFloat(e.target.value) || 0, inch) })}
                  placeholder="ft" style={{ width: "50%", padding: "9px 10px", borderRadius: 7, border: `1px solid ${COLORS.line}`, background: COLORS.surfaceRaised, color: COLORS.text, fontSize: 14, fontFamily: "'IBM Plex Mono', monospace" }} />
                <input type="number" value={inch} onChange={(e) => saveProfile({ ...profile, heightCm: ftInToCm(ft, parseFloat(e.target.value) || 0) })}
                  placeholder="in" style={{ width: "50%", padding: "9px 10px", borderRadius: 7, border: `1px solid ${COLORS.line}`, background: COLORS.surfaceRaised, color: COLORS.text, fontSize: 14, fontFamily: "'IBM Plex Mono', monospace" }} />
              </div>
            )}
          </div>
          <div style={{ flex: "1 1 80px" }}>
            <label style={{ fontSize: 11, color: COLORS.textMuted }}>Age</label>
            <input type="number" value={profile.age} onChange={(e) => saveProfile({ ...profile, age: parseInt(e.target.value) || 0 })}
              style={{ width: "100%", padding: "9px 10px", marginTop: 5, borderRadius: 7, border: `1px solid ${COLORS.line}`, background: COLORS.surfaceRaised, color: COLORS.text, fontSize: 14, fontFamily: "'IBM Plex Mono', monospace" }} />
          </div>
          <div style={{ flex: "1 1 140px" }}>
            <label style={{ fontSize: 11, color: COLORS.textMuted }}>Sex (for estimate)</label>
            <div style={{ marginTop: 5 }}>
              <Segmented options={[{ value: "male", label: "Male" }, { value: "female", label: "Female" }]} value={profile.sex} onChange={(v) => saveProfile({ ...profile, sex: v })} />
            </div>
          </div>
        </div>

        <div className="flex" style={{ gap: 10, flexWrap: "wrap", marginBottom: 12 }}>
          <div style={{ flex: "1 1 220px" }}>
            <label style={{ fontSize: 11, color: COLORS.textMuted }}>Activity level</label>
            <select value={profile.activityLevel} onChange={(e) => saveProfile({ ...profile, activityLevel: e.target.value })}
              style={{ width: "100%", padding: "9px 10px", marginTop: 5, borderRadius: 7, border: `1px solid ${COLORS.line}`, background: COLORS.surfaceRaised, color: COLORS.text, fontSize: 13 }}>
              {ACTIVITY_LEVELS.map((a) => <option key={a.value} value={a.value}>{a.label} — {a.desc}</option>)}
            </select>
          </div>
          <div style={{ flex: "1 1 200px" }}>
            <label style={{ fontSize: 11, color: COLORS.textMuted }}>Goal</label>
            <div style={{ marginTop: 5 }}>
              <Segmented options={GOALS.map((g) => ({ value: g.value, label: g.label }))} value={profile.goal} onChange={(v) => saveProfile({ ...profile, goal: v })} />
            </div>
          </div>
        </div>

        {!latestWeightKg ? (
          <div style={{ fontSize: 12.5, color: COLORS.textFaint, padding: "8px 2px" }}>Log a bodyweight entry on the Bodyweight tab to calculate your estimate.</div>
        ) : (
          <div className="flex" style={{ gap: 12, flexWrap: "wrap" }}>
            <StatCard label="BMR" value={`${Math.round(bmr)} kcal`} sub="basal rate" color={CATEGORY_COLORS.Other} />
            <StatCard label="MAINTENANCE (TDEE)" value={`${Math.round(tdee)} kcal`} sub={activity.label} color={CATEGORY_COLORS.Legs} />
            <StatCard label="DAILY TARGET" value={`${Math.round(target)} kcal`} sub={goal.label} color={CATEGORY_COLORS.Push} />
          </div>
        )}
        <div style={{ fontSize: 10.5, color: COLORS.textFaint, marginTop: 10 }}>
          Estimated using the Mifflin-St Jeor formula from your latest logged bodyweight. Treat it as a starting point — adjust based on how your weight actually trends over a few weeks.
        </div>
      </div>

      <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 10, padding: 16 }}>
        <div className="flex items-center justify-between" style={{ marginBottom: 12 }}>
          <span style={{ fontSize: 12, color: COLORS.textMuted, fontFamily: "'IBM Plex Mono', monospace", letterSpacing: 0.5 }}>LOG FOOD</span>
          <input type="date" value={date} onChange={(e) => setDate(e.target.value)}
            style={{ padding: "6px 8px", borderRadius: 6, border: `1px solid ${COLORS.line}`, background: COLORS.surfaceRaised, color: COLORS.text, fontSize: 12 }} />
        </div>
        <input value={name} onChange={(e) => setName(e.target.value)} placeholder="Food or meal name"
          style={{ width: "100%", padding: "9px 10px", borderRadius: 7, border: `1px solid ${COLORS.line}`, background: COLORS.surfaceRaised, color: COLORS.text, fontSize: 13.5, marginBottom: 10 }} />
        <div className="flex" style={{ gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
          <div style={{ flex: "1 1 100px" }}>
            <label style={{ fontSize: 10.5, color: COLORS.textMuted }}>Calories</label>
            <input type="number" value={calories} onChange={(e) => setCalories(e.target.value)} placeholder="0"
              style={{ width: "100%", padding: "8px 9px", marginTop: 4, borderRadius: 6, border: `1px solid ${COLORS.line}`, background: COLORS.surfaceRaised, color: COLORS.text, fontSize: 13, fontFamily: "'IBM Plex Mono', monospace" }} />
          </div>
          <div style={{ flex: "1 1 90px" }}>
            <label style={{ fontSize: 10.5, color: MACRO_COLORS.protein }}>Protein g</label>
            <input type="number" value={protein} onChange={(e) => setProtein(e.target.value)} placeholder="0"
              style={{ width: "100%", padding: "8px 9px", marginTop: 4, borderRadius: 6, border: `1px solid ${COLORS.line}`, background: COLORS.surfaceRaised, color: COLORS.text, fontSize: 13, fontFamily: "'IBM Plex Mono', monospace" }} />
          </div>
          <div style={{ flex: "1 1 90px" }}>
            <label style={{ fontSize: 10.5, color: MACRO_COLORS.carbs }}>Carbs g</label>
            <input type="number" value={carbs} onChange={(e) => setCarbs(e.target.value)} placeholder="0"
              style={{ width: "100%", padding: "8px 9px", marginTop: 4, borderRadius: 6, border: `1px solid ${COLORS.line}`, background: COLORS.surfaceRaised, color: COLORS.text, fontSize: 13, fontFamily: "'IBM Plex Mono', monospace" }} />
          </div>
          <div style={{ flex: "1 1 90px" }}>
            <label style={{ fontSize: 10.5, color: MACRO_COLORS.fat }}>Fat g</label>

              style={{ width: "100%", padding: "8px 9px", marginTop: 4, borderRadius: 6, border: `1px solid ${COLORS.line}`, background: COLORS.surfaceRaised, color: COLORS.text, fontSize: 13, fontFamily: "'IBM Plex Mono', monospace" }} />

        <button onClick={submitFood} disabled={!name.trim() || !(parseFloat(calories) >= 0)}
          style={{ width: "100%", padding: "10px 0", borderRadius: 8, border: "none", background: name.trim() && parseFloat(calories) >= 0 ? COLORS.text : COLORS.line, color: name.trim() && parseFloat(calories) >= 0 ? COLORS.bg : COLORS.textFaint, fontWeight: 700, fontSize: 13, cursor: name.trim() && parseFloat(calories) >= 0 ? "pointer" : "not-allowed" }}>
          ADD FOOD
